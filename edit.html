<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نتائج فريقي | عرض الجوال</title>
    <style>
        :root {
            --primary: #38bdf8; --accent: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155;
            --win-bg: rgba(34, 197, 94, 0.2); --win-border: #22c55e;
            --loss-bg: rgba(239, 68, 68, 0.2); --loss-border: #ef4444;
            --draw-bg: rgba(245, 158, 11, 0.2); --draw-border: #f59e0b;
            --pending-bg: #1e293b; --pending-border: #475569;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text); line-height: 1.6;
        }

        header { 
            text-align: center; padding: 15px; background: var(--card); 
            border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header h1 { font-size: 1.2rem; margin: 0 0 10px 0; }

        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; }

        /* تنسيق القوائم المنسدلة للجوال */
        select { 
            width: 100%; padding: 12px; background: #0f172a; border: 2px solid var(--border); 
            border-radius: 10px; color: white; font-size: 1rem; margin-bottom: 10px;
            outline: none; transition: 0.3s; appearance: none;
        }
        select:focus { border-color: var(--primary); }

        .filter-box {
            background: var(--card); padding: 15px; border-radius: 15px;
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        /* حاوية الجولة */
        .round-container { margin-bottom: 25px; }
        .round-title { 
            background: var(--accent); color: white; padding: 4px 15px; 
            border-radius: 20px; font-size: 0.9rem; font-weight: bold; 
            display: inline-block; margin-bottom: 10px;
        }

        /* كرت المباراة الملون بالكامل */
        .match-item { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border-right: 8px solid transparent; /* شريط جانبي ملون */
            transition: transform 0.2s;
        }

        /* حالات الألوان تغطي الخلفية والحدود */
        .win-card { background: var(--win-bg); border: 1px solid var(--win-border); border-right-width: 8px; }
        .loss-card { background: var(--loss-bg); border: 1px solid var(--loss-border); border-right-width: 8px; }
        .draw-card { background: var(--draw-bg); border: 1px solid var(--draw-border); border-right-width: 8px; }
        .pending-card { background: var(--pending-bg); border: 1px solid var(--pending-border); border-right-width: 8px; }

        .team-name { flex: 1; font-weight: bold; font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; }
        .team-left { text-align: right; padding-left: 5px; }
        .team-right { text-align: left; padding-right: 5px; }
        
        .score-box { 
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 8px;
            min-width: 70px; font-weight: 900; font-size: 1.2rem; gap: 8px;
        }
        .vs-label { font-size: 0.7rem; color: #94a3b8; }

        .no-data { text-align: center; padding: 40px; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>🏆 نتائج مباريات الدوري</h1>
    <select id="leagueSelector" onchange="loadLeagueData()">
        <option value="league1">SC League (البطولة 1)</option>
        <option value="league2">KC League (البطولة 2)</option>
    </select>
</header>

<div class="container">
    <div class="filter-box">
        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--primary);">اختر اسمك/فريقك:</label>
        <select id="userTeamSelect" onchange="renderUserPath()">
            <option value="">-- اختر الفريق --</option>
        </select>
    </div>

    <div id="pathGrid">
        <p class="no-data">يرجى اختيار فريقك لعرض جدول مبارياته.</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    let currentLeagueTeams = [];
    let savedMatches = {};
    let fullSchedule = [];

    function createSchedule(teams) {
        let t = [...teams];
        if (t.length % 2 !== 0) t.push({ id: 'bye', name: 'استراحة' });
        let rounds = [];
        let n = t.length;
        for (let r = 0; r < (n - 1) * 2; r++) {
            let roundMatches = [];
            for (let i = 0; i < n / 2; i++) {
                let home = t[i], away = t[n - 1 - i];
                if (home.id !== 'bye' && away.id !== 'bye') {
                    roundMatches.push(r >= n - 1 ? { h: away, a: home } : { h: home, a: away });
                }
            }
            rounds.push(roundMatches);
            t.splice(1, 0, t.pop());
        }
        return rounds;
    }

    async function loadLeagueData() {
        const league = document.getElementById("leagueSelector").value;
        const userSelect = document.getElementById("userTeamSelect");
        
        const teamsSnap = await db.collection(league).get();
        currentLeagueTeams = [];
        userSelect.innerHTML = '<option value="">-- اختر الفريق --</option>';
        teamsSnap.forEach(doc => {
            currentLeagueTeams.push({id: doc.id, name: doc.data().name});
            userSelect.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
        });

        const matchesSnap = await db.collection("matches_history").where("league", "==", league).get();
        savedMatches = {};
        matchesSnap.forEach(doc => { savedMatches[`${doc.data().t1Id}_${doc.data().t2Id}`] = doc.data(); });

        fullSchedule = createSchedule(currentLeagueTeams);
        renderUserPath();
    }

    function renderUserPath() {
        const selectedId = document.getElementById("userTeamSelect").value;
        const grid = document.getElementById("pathGrid");
        if (!selectedId) { grid.innerHTML = '<p class="no-data">يرجى اختيار فريقك من القائمة.</p>'; return; }

        grid.innerHTML = "";
        fullSchedule.forEach((matches, idx) => {
            const match = matches.find(m => m.h.id === selectedId || m.a.id === selectedId);
            if (match) {
                const res = savedMatches[`${match.h.id}_${match.a.id}`];
                let cardClass = "pending-card", scoreHtml = `<span class="vs-label">VS</span>`;

                if (res) {
                    const isH = match.h.id === selectedId;
                    const myG = isH ? res.g1 : res.g2, opG = isH ? res.g2 : res.g1;
                    scoreHtml = `<span>${res.g1} - ${res.g2}</span>`;
                    cardClass = myG > opG ? "win-card" : (myG < opG ? "loss-card" : "draw-card");
                }

                grid.innerHTML += `
                    <div class="round-container">
                        <div class="round-title">الجولة ${idx + 1}</div>
                        <div class="match-item ${cardClass}">
                            <span class="team-name team-left">${match.h.name}</span>
                            <div class="score-box">${scoreHtml}</div>
                            <span class="team-name team-right">${match.a.name}</span>
                        </div>
                    </div>`;
            }
        });
    }
    loadLeagueData();
</script>
</body>
</html>
