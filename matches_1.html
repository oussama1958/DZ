<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الدوري الاحترافي | League 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --gold: #c39738; --text: #f8fafc; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; }
        header { background: #16213e; padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); sticky; top: 0; z-index: 1000; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        
        .round-box { background: rgba(255,255,255,0.02); border-radius: 15px; padding: 20px; margin-bottom: 40px; border: 1px solid rgba(195,151,56,0.2); }
        .round-header { background: var(--gold); color: #000; padding: 8px 25px; border-radius: 50px; display: inline-block; margin-bottom: 20px; font-weight: 900; box-shadow: 0 4px 15px rgba(195,151,56,0.3); }
        
        .matches-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .match-card { background: var(--card); border-radius: 12px; padding: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        
        .team { display: flex; align-items: center; gap: 10px; width: 42%; }
        .team img { width: 32px; height: 32px; object-fit: contain; background: #fff; border-radius: 50%; padding: 2px; }
        .team span { font-size: 0.8rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; }
        .vs { background: #000; color: var(--gold); padding: 4px 10px; border-radius: 6px; font-weight: 900; font-size: 0.7rem; border: 1px solid var(--gold); }
        
        .phase-title { text-align: center; color: var(--gold); font-size: 2rem; margin: 40px 0; text-decoration: underline; }
    </style>
</head>
<body>

                <a href="#" class="nav-item dropbtn"> ⚽ سجل المباريات  ▼</a>

                </div>

</nav>

<style>
    /* تنسيق شريط التنقل */
    :root {
        --nav-bg: #16213e;
        --nav-hover: #1e293b;
        --accent-color: #c39738; /* اللون الذهبي */
        --text-white: #f8fafc;
    }

    .main-nav {
        background-color: var(--nav-bg);
        padding: 10px 0;
        border-bottom: 3px solid var(--accent-color);
        position: sticky;
        top: 0;
        z-index: 9999;
        font-family: 'Cairo', sans-serif;
    }

    .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
    }

    .nav-logo {
        color: var(--accent-color);
        font-weight: 900;
        font-size: 1.5rem;
    }

    .nav-links {
        list-style: none;
        display: flex;
        gap: 15px;
        margin: 0;
        padding: 0;
    }

    .nav-item {
        color: var(--text-white);
        text-decoration: none;
        padding: 8px 15px;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
        font-size: 0.9rem;
    }

    .nav-item:hover {
        background: var(--nav-hover);
        color: var(--accent-color);
    }

    /* القائمة المنسدلة */
    .dropdown {
        position: relative;
        display: inline-block;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        background-color: var(--nav-bg);
        min-width: 160px;
        box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--accent-color);
        top: 100%;
        right: 0;
    }

    .dropdown-content a {
        color: white;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        font-size: 0.85rem;
    }

    .dropdown-content a:hover {
        background-color: var(--nav-hover);
        color: var(--accent-color);
    }

    .dropdown:hover .dropdown-content {
        display: block;
    }

    /* للجوال */
    @media (max-width: 768px) {
        .nav-container { flex-direction: column; gap: 10px; }
        .nav-links { flex-wrap: wrap; justify-content: center; }
    }
</style>
<header>
    <h1>🏆 SC League - الجدول الرسمي</h1>
    <p>30 جولة منظمة (8 مباريات متزامنة لكل جولة)</p>
</header>

<div class="container" id="mainContainer"></div>

<script>
const players = [
    { id: "GSS-", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v3/Competitors/106" },
    { id: "Giyuu", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v3/Competitors/110" },
    { id: "Walid_mkd", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v4/Competitors/8218" },
    { id: "Oussama", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v3/Competitors/105" },
    { id: "Abdellatifdaoudi", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v3/Competitors/11113" },
    { id: "Oussa", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v6/Competitors/224" },
    { id: "MohammedLaouar", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v4/Competitors/331" },
    { id: "Dz3yacine", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v11/Competitors/227" },
    { id: "ABDOU", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v2/Competitors/8222" },
    { id: "Imad", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v11/Competitors/234" },
    { id: "algeer", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v2/Competitors/9036" },
    { id: "ZINOU", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v6/Competitors/341" },
    { id: "Asta", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v1/Competitors/11116" },
    { id: "Hamidbml", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v8/Competitors/114" },
    { id: "BOB", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v7/Competitors/131" },
    { id: "Anis", logo: "https://imagecache.365scores.com/image/upload/f_png,w_24,h_24,c_limit,q_auto:eco,dpr_3,d_Competitors:default1.png/v1/Competitors/8213" }
];

function generateLeagueStructure() {
    let tempPlayers = [...players];
    let totalRounds = tempPlayers.length - 1;
    let matchesPerRound = tempPlayers.length / 2;
    let fullSchedule = [];

    for (let r = 0; r < totalRounds; r++) {
        let roundMatches = [];
        for (let m = 0; m < matchesPerRound; m++) {
            roundMatches.push({
                home: tempPlayers[m],
                away: tempPlayers[tempPlayers.length - 1 - m]
            });
        }
        fullSchedule.push(roundMatches);
        
        // تدوير اللاعبين مع تثبيت الأول (الخوارزمية الصحيحة)
        tempPlayers.splice(1, 0, tempPlayers.pop());
    }
    return fullSchedule;
}

const schedule = generateLeagueStructure();
const container = document.getElementById('mainContainer');

function render() {
    let html = '<h2 class="phase-title">ذهاب الدوري (الجولات 1-15)</h2>';
    
    // الذهاب
    schedule.forEach((round, i) => {
        html += `<div class="round-box">
            <div class="round-header">الجولة ${i+1}</div>
            <div class="matches-grid">`;
        round.forEach(m => {
            html += `<div class="match-card">
                <div class="team"><img src="${m.home.logo}"><span>${m.home.id}</span></div>
                <div class="vs">VS</div>
                <div class="team" style="justify-content:flex-end"><span>${m.away.id}</span><img src="${m.away.logo}"></div>
            </div>`;
        });
        html += `</div></div>`;
    });

    html += '<h2 class="phase-title">إياب الدوري (الجولات 16-30)</h2>';

    // الإياب
    schedule.forEach((round, i) => {
        html += `<div class="round-box">
            <div class="round-header">الجولة ${i+16}</div>
            <div class="matches-grid">`;
        round.forEach(m => {
            html += `<div class="match-card">
                <div class="team"><img src="${m.away.logo}"><span>${m.away.id}</span></div>
                <div class="vs">VS</div>
                <div class="team" style="justify-content:flex-end"><span>${m.home.id}</span><img src="${m.home.logo}"></div>
            </div>`;
        });
        html += `</div></div>`;
    });

    container.innerHTML = html;
}

render();
</script>
</body>
</html>
