<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHAMPIONS LEAGUE DZ | دوري الأبطال</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --sidebar-bg: #16213e;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --accent: #fbbf24;
            --danger: #ef4444;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            color: var(--text); min-height: 100vh; line-height: 1.4;
            overflow-x: hidden;
        }

        /* --- Sidebar & UI --- */
        .menu-toggle { position: fixed; top: 15px; right: 15px; z-index: 1001; background: var(--primary); color: white; border: none; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: var(--shadow); }
        .sidebar { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: var(--sidebar-bg); z-index: 9999; border-left: 3px solid var(--primary); padding: 30px 15px; display: flex; flex-direction: column; }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); z-index: 9998; display: none; }
        .overlay.active { display: block; }

        .sidebar-header { text-align: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .user-nav-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); background: #fff; object-fit: cover; margin-bottom: 8px; }
        .nav-item { color: var(--text); text-decoration: none; padding: 10px 12px; display: flex; align-items: center; gap: 10px; border-radius: 8px; font-weight: 500; margin-bottom: 4px; font-size: 0.9rem; }
        .nav-item:hover, .nav-item.active-link { background: rgba(14, 165, 233, 0.15); color: var(--primary); }

        /* --- Floating Chat --- */
        .floating-chat {
            position: fixed; bottom: 20px; left: 20px;
            width: 50px; height: 50px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.2rem; text-decoration: none;
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4); z-index: 1000;
        }

        /* --- UCL Content --- */
        .header { padding: 70px 15px 30px; text-align: center; }
        .header h1 { font-size: 1.8rem; margin-bottom: 20px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .switch-container { display: inline-flex; background: rgba(15, 23, 42, 0.8); padding: 4px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .switch-btn { background: transparent; border: none; padding: 8px 18px; color: var(--text-muted); border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.85rem; }
        .switch-btn.active { background: var(--primary); color: white; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 10px 80px; }
        .tab-content { display: none; }
        .tab-content.active-section { display: block; animation: fadeIn 0.3s ease; }

        /* --- Tables Responsive --- */
        .group-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .group-card { background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border); padding: 12px; backdrop-filter: blur(8px); }
        .group-name { color: var(--accent); font-weight: 800; text-align: center; margin-bottom: 10px; font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { color: var(--text-muted); border-bottom: 1px solid var(--border); padding: 8px 2px; font-size: 0.7rem; }
        td { padding: 10px 2px; border-bottom: 1px solid rgba(255,255,255,0.03); text-align: center; }
        .team-logo-small { width: 20px; height: 20px; vertical-align: middle; margin-left: 4px; background: #fff; border-radius: 3px; }
        .team-name-cell { text-align: right; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* --- Knockout Stages Mobile --- */
        .stage-title { background: var(--primary); color: white; padding: 5px 15px; border-radius: 8px; display: inline-block; margin: 20px 0 12px; font-weight: bold; font-size: 0.9rem; }
        .match-card { background: var(--card-bg); border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 5px; }
        .team-box { display: flex; align-items: center; gap: 6px; width: 42%; font-size: 0.85rem; }
        .team-box span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .score-box { background: var(--bg); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--primary); color: var(--accent); font-weight: 800; font-size: 0.95rem; min-width: 55px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.5rem; }
            .group-grid { grid-template-columns: 1fr; }
            .team-box { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<a href="chat.html" class="floating-chat" title="دردشة اللاعبين">
    <i class="fas fa-comments"></i>
</a>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div id="authAction">
            <i class="fas fa-user-circle" style="font-size: 2.5rem; color: var(--text-muted); margin-bottom: 10px;"></i>
            <a href="login.html" class="nav-item" style="background:var(--primary); justify-content:center; color:white;">🔐 دخول</a>
        </div>
        <div id="userInfo" style="display: none; flex-direction: column; align-items: center;">
            <img id="navUserImg" src="" class="user-nav-img">
            <span id="navUserName" style="font-weight: bold; color: var(--accent); font-size: 0.9rem;"></span>
            <a href="#" onclick="logout()" style="color:var(--danger); font-size:0.75rem; text-decoration:none; margin-top:10px;"><i class="fas fa-sign-out-alt"></i> خروج</a>
        </div>
    </div>
    <div class="nav-links">
        <a class='nav-item' href='index.html'><i class="fas fa-home"></i> الرئيسية</a>
        <a class='nav-item active-link' href='ucl.html'><i class="fas fa-star"></i> دوري الأبطال</a>
        <a class='nav-item' href='cup.html'><i class="fas fa-trophy"></i> الكأس</a>
        <a class='nav-item' href='chat.html'><i class="fas fa-comments"></i> الدردشة</a>
        <a class='nav-item active-link' href='journalist.html'><i class="fas fa-bullhorn"></i> صحيفة البطولة</a>
    </div>
</nav>

<div class="header">
    <h1>CHAMPIONS LEAGUE</h1>
    <div class="switch-container">
        <button class="switch-btn active" onclick="toggleView('groups', this)">المجموعات</button>
        <button class="switch-btn" onclick="toggleView('knockout', this)">الإقصائيات</button>
    </div>
</div>

<div class="container">
    <div id="groups-section" class="tab-content active-section">
        <div id="groupsContainer" class="group-grid"></div>
    </div>

    <div id="knockout-section" class="tab-content">
        <div id="knockoutContainer"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function toggleView(view, btn) {
        document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(view + '-section').classList.add('active-section');
        btn.classList.add('active');
    }

    async function checkAuth() {
        const loggedPlayer = localStorage.getItem("activePlayer");
        if (loggedPlayer) {
            document.getElementById("authAction").style.display = "none";
            const userInfoDiv = document.getElementById("userInfo");
            userInfoDiv.style.display = "flex";
            
            const snap = await db.collection("teams").where("playerTeamName", "==", loggedPlayer).get();
            if (!snap.empty) {
                const data = snap.docs[0].data();
                document.getElementById("navUserName").innerText = data.playerTeamName;
                document.getElementById("navUserImg").src = data.clubLogo || 'https://via.placeholder.com/80';
            }
        }
    }

    function logout() {
        localStorage.removeItem("activePlayer");
        window.location.reload();
    }

    function loadGroups() {
        db.collection("ucl_groups").onSnapshot(snap => {
            const container = document.getElementById("groupsContainer");
            container.innerHTML = "";
            const groupsMap = {};

            snap.forEach(doc => {
                const t = doc.data();
                const g = t.group || "A";
                if (!groupsMap[g]) groupsMap[g] = [];
                groupsMap[g].push(t);
            });

            Object.keys(groupsMap).sort().forEach(gName => {
                const teams = groupsMap[gName].sort((a,b) => (b.points - a.points) || (b.gd - a.gd));
                let rows = teams.map((t, i) => `
                    <tr>
                        <td>${i+1}</td>
                        <td class="team-name-cell"><img src="${t.logo}" class="team-logo-small"> ${t.name}</td>
                        <td>${t.played}</td>
                        <td>${t.goalsFor}:${t.goalsAgainst}</td>
                        <td>${t.gd > 0 ? '+'+t.gd : t.gd}</td>
                        <td style="color:var(--primary); font-weight:bold;">${t.points}</td>
                    </tr>
                `).join('');

                container.innerHTML += `
                    <div class="group-card">
                        <div class="group-name">المجموعة ${gName}</div>
                        <table>
                            <thead><tr><th>#</th><th style="text-align:right">الفريق</th><th>ل</th><th>+/-</th><th>ف</th><th>ن</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            });
        });
    }

    function loadKnockout() {
        db.collection("ucl_knockout").orderBy("time", "desc").onSnapshot(snap => {
            const container = document.getElementById("knockoutContainer");
            container.innerHTML = "";
            const stageLabels = { "32": "دور الـ 32", "16": "دور الـ 16", "8": "ربع النهائي", "4": "نصف النهائي", "final": "النهائي" };
            const grouped = {};

            snap.forEach(doc => {
                const m = doc.data();
                if (!grouped[m.stage]) grouped[m.stage] = [];
                grouped[m.stage].push(m);
            });

            ["final", "4", "8", "16", "32"].forEach(st => {
                if (grouped[st]) {
                    container.innerHTML += `<div class="stage-title">${stageLabels[st]}</div>`;
                    grouped[st].forEach(m => {
                        container.innerHTML += `
                            <div class="match-card">
                                <div class="team-box"><img src="${m.t1Logo}" style="width:20px;"> <span>${m.t1Name}</span></div>
                                <div class="score-box">${m.score1} - ${m.score2}</div>
                                <div class="team-box" style="justify-content:flex-end; flex-direction:row-reverse;">
                                    <img src="${m.t2Logo}" style="width:20px;"> <span>${m.t2Name}</span>
                                </div>
                            </div>
                        `;
                    });
                }
            });
        });
    }

    checkAuth();
    loadGroups();
    loadKnockout();
</script>
</body>
</html>
