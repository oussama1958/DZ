<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول اللاعبين | LEAGUE 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050a18; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .login-box { background: #101628; padding: 40px; border-radius: 20px; border: 1px solid rgba(195, 151, 56, 0.4); width: 380px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .logo { font-size: 2.5rem; font-weight: 900; color: #c39738; margin-bottom: 5px; text-shadow: 0 0 15px rgba(195,151,56,0.4); }
        p { opacity: 0.6; font-size: 0.9rem; margin-bottom: 30px; }
        select, input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #1e293b; background: #1e293b; color: white; font-family: 'Cairo'; box-sizing: border-box; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: #c39738; }
        button { width: 100%; padding: 15px; background: #c39738; border: none; border-radius: 10px; color: black; font-weight: 900; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
        button:hover { background: #f1c40f; transform: scale(1.02); }
        #errMsg { color: #ff4757; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">DZ LEAGUE</div>
    <p>يرجى اختيار اسمك وإدخال كلمة السر للدخول</p>

    <select id="playerSelect">
        <option>جاري تحميل قائمة اللاعبين...</option>
    </select>

    <input type="password" id="passInput" placeholder="كلمة السر الخاصة بك">

    <button onclick="attemptLogin()">تسجيل الدخول</button>
    <div id="errMsg">❌ كلمة السر غير صحيحة أو الحساب غير مفعل.</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    // جلب قائمة اللاعبين من مجموعة teams
    async function getPlayers() {
        const select = document.getElementById('playerSelect');
        try {
            const snap = await db.collection("teams").get();
            select.innerHTML = '<option value="" disabled selected>-- اختر اسمك --</option>';
            snap.forEach(doc => {
                const data = doc.data();
                let op = document.createElement('option');
                op.value = data.playerTeamName;
                op.innerText = data.playerTeamName;
                select.appendChild(op);
            });
        } catch (e) { select.innerHTML = '<option>خطأ في جلب البيانات</option>'; }
    }

    async function attemptLogin() {
        const player = document.getElementById('playerSelect').value;
        const pass = document.getElementById('passInput').value;
        const error = document.getElementById('errMsg');

        if (!player || !pass) return;

        try {
            const authDoc = await db.collection("player_auth").doc(player).get();

            if (authDoc.exists && authDoc.data().password === pass) {
                // حفظ الجلسة وتوجيه اللاعب
                localStorage.setItem("activePlayer", player);
                window.location.href = "index_player.html";
            } else {
                error.style.display = "block";
            }
        } catch (e) {
            alert("حدث خطأ في الاتصال بالقاعدة");
        }
    }
    getPlayers();
</script>
</body>
</html>
