<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتائج الكأس | Cup Results</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; text-shadow: 0 0 10px rgba(14, 165, 233, 0.3); }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .tab-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
        }

        .matches-container {
            max-width: 800px;
            margin: auto;
            display: none;
        }
        .matches-container.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .match-card {
            background: var(--card);
            margin-bottom: 15px;
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .match-card:hover { border-color: var(--primary); transform: scale(1.02); }

        .team {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 42%;
        }
        .team.left { justify-content: flex-start; text-align: right; }
        .team.right { justify-content: flex-end; text-align: left; flex-direction: row-reverse; }

        /* تعديل عرض الصور لضمان ظهورها من Firebase */
        .team img { 
            width: 50px; 
            height: 50px; 
            object-fit: contain; 
            background: white; /* خلفية بيضاء لتظهر الشعارات المفرغة بوضوح */
            border: 2px solid var(--border);
            border-radius: 50%;
            padding: 4px;
        }
        .team-name { font-weight: 600; font-size: 1.1rem; }

        .score-area {
            text-align: center;
            min-width: 90px;
        }
        .score-box {
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            border: 1px solid var(--border);
            display: inline-block;
        }
        .status { font-size: 11px; color: #64748b; margin-top: 5px; text-transform: uppercase; }

        @media (max-width: 600px) {
            .team-name { font-size: 0.85rem; }
            .team img { width: 35px; height: 35px; }
            .score-box { font-size: 18px; padding: 5px 10px; }
            .match-card { padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <h1>🏆 إقصائيات الكأس</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showRound('round32', this)">دور الـ 32</button>
        <button class="tab-btn" onclick="showRound('round16', this)">دور الـ 16</button>
        <button class="tab-btn" onclick="showRound('round8', this)">ربع النهائي</button>
        <button class="tab-btn" onclick="showRound('round4', this)">نصف النهائي</button>
        <button class="tab-btn" onclick="showRound('round2', this)">النهائي</button>
    </div>

    <div id="round32" class="matches-container active"></div>
    <div id="round16" class="matches-container"></div>
    <div id="round8" class="matches-container"></div>
    <div id="round4" class="matches-container"></div>
    <div id="round2" class="matches-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
            authDomain: "cluuuub-90ab9.firebaseapp.com",
            projectId: "cluuuub-90ab9"
        });
        const db = firebase.firestore();

        function showRound(roundId, btn) {
            document.querySelectorAll('.matches-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(roundId).classList.add('active');
            btn.classList.add('active');
        }

        function loadCupMatches() {
            // جلب البيانات مع ترتيبها (اختياري)
            db.collection("cup_matches").onSnapshot(snapshot => {
                const rounds = ['round32', 'round16', 'round8', 'round4', 'round2'];
                rounds.forEach(r => document.getElementById(r).innerHTML = "");

                snapshot.forEach(doc => {
                    const m = doc.data();
                    const container = document.getElementById(m.round);
                    
                    if (container) {
                        // استخدام m.t1.logo و m.t2.logo مباشرة لأنها روابط Firebase
                        container.innerHTML += `
                            <div class="match-card">
                                <div class="team left">
                                    <img src="${m.t1.logo}" onerror="this.src='https://via.placeholder.com/50'" alt="logo">
                                    <span class="team-name">${m.t1.name}</span>
                                </div>
                                
                                <div class="score-area">
                                    <div class="score-box">${m.score1} - ${m.score2}</div>
                                    <div class="status">انتهت</div>
                                </div>

                                <div class="team right">
                                    <img src="${m.t2.logo}" onerror="this.src='https://via.placeholder.com/50'" alt="logo">
                                    <span class="team-name">${m.t2.name}</span>
                                </div>
                            </div>
                        `;
                    }
                });

                // رسالة في حال كان الدور خالياً
                rounds.forEach(r => {
                    if(document.getElementById(r).innerHTML === "") {
                        document.getElementById(r).innerHTML = "<p style='text-align:center; color:#64748b; margin-top:50px;'>لا توجد مباريات مسجلة حالياً في هذا الدور</p>";
                    }
                });
            });
        }

        loadCupMatches();
    </script>
</body>
</html>
