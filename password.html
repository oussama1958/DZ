<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | تعيين كلمات السر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .admin-card { background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #c39738; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #c39738; text-align: center; font-weight: 900; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-family: 'Cairo'; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #c39738; color: black; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #e2b34c; transform: translateY(-2px); }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>إدارة حسابات اللاعبين</h2>
    <hr style="border: 0.5px solid rgba(195, 151, 56, 0.2); margin-bottom: 25px;">
    
    <div class="input-group">
        <label>اختر اللاعب (32 فريق):</label>
        <select id="teamSelect">
            <option>جاري جلب اللاعبين من Firebase...</option>
        </select>
    </div>

    <div class="input-group">
        <label>تعيين كلمة السر لهذا اللاعب:</label>
        <input type="password" id="passInput" placeholder="أدخل كلمة السر هنا">
    </div>

    <button onclick="savePassword()">حفظ وإرسال</button>
    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    // جلب الفرق بناءً على حقول Firebase الخاصة بك
    async function loadTeams() {
        const select = document.getElementById('teamSelect');
        try {
            const snapshot = await db.collection("teams").get();
            select.innerHTML = '<option value="" disabled selected>-- اختر اللاعب --</option>';
            snapshot.forEach(doc => {
                const data = doc.data();
                let opt = document.createElement('option');
                opt.value = data.playerTeamName; 
                opt.innerText = `${data.playerTeamName} - (${data.clubName})`;
                select.appendChild(opt);
            });
        } catch (e) { select.innerHTML = '<option>خطأ في التحميل!</option>'; }
    }

    async function savePassword() {
        const player = document.getElementById('teamSelect').value;
        const pass = document.getElementById('passInput').value;
        const status = document.getElementById('status');

        if (!player || !pass) { alert("أكمل البيانات أولاً"); return; }

        try {
            await db.collection("player_auth").doc(player).set({
                password: pass,
                playerTeamName: player
            });
            status.style.color = "#4ade80";
            status.innerText = "✅ تم حفظ كلمة السر بنجاح!";
            document.getElementById('passInput').value = "";
        } catch (e) {
            status.style.color = "#f87171";
            status.innerText = "❌ حدث خطأ أثناء الحفظ";
        }
    }
    loadTeams();
</script>
</body>
</html>
