<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHAMPIONS LEAGUE DZ | غرفة الدردشة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --sidebar-bg: #16213e;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --accent: #fbbf24;
            --danger: #ef4444;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- Sidebar & UI --- */
        .menu-toggle { position: fixed; top: 12px; right: 12px; z-index: 1001; background: var(--primary); color: white; border: none; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: var(--shadow); }
        .sidebar { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: var(--sidebar-bg); z-index: 9999; border-left: 3px solid var(--primary); padding: 30px 15px; display: flex; flex-direction: column; }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); z-index: 9998; display: none; }
        .overlay.active { display: block; }

        .sidebar-header { text-align: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .user-nav-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--primary); background: #fff; object-fit: cover; margin-bottom: 10px; }
        .nav-item { color: var(--text); text-decoration: none; padding: 12px 15px; display: flex; align-items: center; gap: 10px; border-radius: 10px; font-weight: 500; margin-bottom: 5px; font-size: 0.95rem; }
        .nav-item:hover, .nav-item.active-link { background: rgba(14, 165, 233, 0.15); color: var(--primary); }

        /* --- Chat Layout Mobile Optimized --- */
        .chat-container {
            flex: 1; max-width: 900px; margin: 65px auto 0; width: 100%;
            background: var(--card-bg); border-radius: 20px 20px 0 0; border: 1px solid var(--border);
            display: flex; flex-direction: column; backdrop-filter: blur(10px); overflow: hidden;
        }

        .chat-header { padding: 12px 20px; background: rgba(14, 165, 233, 0.15); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .chat-header h2 { margin: 0; font-size: 1rem; color: var(--primary); }
        #onlineStatus { font-size: 0.7rem; color: #10b981; font-weight: bold; }

        #chatMessages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }

        /* --- Message Bubbles --- */
        .msg { display: flex; gap: 8px; max-width: 90%; animation: fadeIn 0.2s ease; }
        .msg.mine { align-self: flex-end; flex-direction: row-reverse; }

        .msg-img { width: 35px; height: 35px; border-radius: 50%; background: #fff; border: 1.5px solid var(--primary); object-fit: cover; flex-shrink: 0; }
        
        .msg-content { display: flex; flex-direction: column; max-width: 100%; }
        .msg-sender { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; padding: 0 5px; }
        .mine .msg-sender { text-align: left; }

        .msg-text { 
            padding: 8px 14px; border-radius: 15px; font-size: 0.9rem; 
            background: rgba(255,255,255,0.07); border: 1px solid var(--border); 
            color: var(--text); position: relative; word-break: break-word; line-height: 1.4;
        }
        .mine .msg-text { background: var(--primary); color: white; border: none; border-bottom-right-radius: 4px; }
        .msg:not(.mine) .msg-text { border-bottom-left-radius: 4px; }

        .msg-time { font-size: 0.6rem; color: var(--text-muted); margin-top: 3px; align-self: flex-end; }

        /* --- Input Area Mobile Fixed --- */
        .chat-input-area { 
            padding: 10px 15px env(safe-area-inset-bottom); 
            background: #16213e; display: flex; gap: 8px; 
            border-top: 1px solid var(--border); align-items: center;
        }
        #msgInput { 
            flex: 1; background: var(--bg); border: 1px solid var(--border); 
            border-radius: 20px; padding: 10px 18px; color: white; outline: none; 
            font-size: 0.95rem; height: 42px;
        }
        #msgInput:focus { border-color: var(--primary); background: #1e293b; }
        
        .send-btn { 
            background: var(--primary); color: white; border: none; 
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer; 
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
        }
        .send-btn:active { transform: scale(0.9); background: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Media Queries for small screens */
        @media (max-width: 480px) {
            .chat-container { margin-top: 60px; border-radius: 0; border: none; }
            .msg { max-width: 95%; }
            .msg-text { font-size: 0.85rem; padding: 7px 12px; }
            .menu-toggle { top: 10px; right: 10px; width: 38px; height: 38px; }
        }
    </style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div id="authAction">
            <a href="login.html" class="nav-item" style="background:var(--primary); justify-content:center; color:white;">🔐 دخول اللاعبين</a>
        </div>
        <div id="userInfo" style="display: none; flex-direction: column; align-items: center;">
            <img id="navUserImg" src="" class="user-nav-img">
            <span id="navUserName" style="font-weight: bold; color: var(--accent); font-size: 0.9rem;"></span>
            <a href="#" onclick="logout()" style="color:var(--danger); font-size:0.75rem; text-decoration:none; margin-top:10px;"><i class="fas fa-sign-out-alt"></i> خروج</a>
        </div>
    </div>
    <div class="nav-links">
        <a class='nav-item' href='index.html'><i class="fas fa-home"></i> الرئيسية</a>
        <a class='nav-item active-link' href='chat.html'><i class="fas fa-comments"></i> الدردشة</a>
        <a class='nav-item' href='ucl.html'><i class="fas fa-star"></i> دوري الأبطال</a>
        <a class='nav-item' href='cup.html'><i class="fas fa-trophy"></i> الكأس</a>
    </div>
</nav>

<div class="chat-container">
    <div class="chat-header">
        <h2><i class="fas fa-comments"></i> دردشة اللاعبين</h2>
        <span id="onlineStatus"><i class="fas fa-circle" style="font-size: 0.6rem;"></i> متصل الآن</span>
    </div>

    <div id="chatMessages">
        </div>

    <div class="chat-input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    let currentUserData = null;

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function checkAuth() {
        const loggedPlayer = localStorage.getItem("activePlayer");
        if (loggedPlayer) {
            const snap = await db.collection("teams").where("playerTeamName", "==", loggedPlayer).get();
            if (!snap.empty) {
                currentUserData = snap.docs[0].data();
                document.getElementById("authAction").style.display = "none";
                document.getElementById("userInfo").style.display = "flex";
                document.getElementById("navUserName").innerText = currentUserData.playerTeamName;
                document.getElementById("navUserImg").src = currentUserData.clubLogo || 'https://via.placeholder.com/80';
            }
        } else {
            document.getElementById("msgInput").placeholder = "سجل دخولك لتتمكن من الدردشة";
            document.getElementById("msgInput").disabled = true;
        }
    }

    async function sendMessage() {
        const text = document.getElementById("msgInput").value.trim();
        if (!text || !currentUserData) return;

        try {
            await db.collection("global_chat").add({
                text: text,
                senderName: currentUserData.playerTeamName,
                senderLogo: currentUserData.clubLogo,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("msgInput").value = "";
        } catch (e) {
            console.error("Error sending message: ", e);
        }
    }

    function loadMessages() {
        db.collection("global_chat").orderBy("timestamp", "asc").onSnapshot(snapshot => {
            const chatBox = document.getElementById("chatMessages");
            chatBox.innerHTML = "";
            
            snapshot.forEach(doc => {
                const m = doc.data();
                const isMine = m.senderName === (currentUserData ? currentUserData.playerTeamName : "");
                const time = m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";

                chatBox.innerHTML += `
                    <div class="msg ${isMine ? 'mine' : ''}">
                        <img src="${m.senderLogo || 'https://via.placeholder.com/40'}" class="msg-img">
                        <div class="msg-content">
                            <span class="msg-sender">${m.senderName}</span>
                            <div class="msg-text">${m.text}</div>
                            <span class="msg-time">${time}</span>
                        </div>
                    </div>
                `;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function logout() {
        localStorage.removeItem("activePlayer");
        window.location.reload();
    }

    checkAuth().then(() => {
        loadMessages();
    });
</script>
</body>
</html>
