<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMPIONS LEAGUE DZ | الدردشة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --mine-msg: #0284c7;
            --other-msg: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg); color: var(--text);
            overflow: hidden; /* يمنع السكرول الخارجي للصفحة */
        }

        /* حاوية التطبيق الرئيسية */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* --- القائمة الجانبية (محسنة للهاتف) --- */
        .players-sidebar {
            width: 280px; background: var(--sidebar-bg);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
            z-index: 2000;
        }

        /* --- منطقة الدردشة --- */
        .chat-main {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg); position: relative;
            min-width: 0; /* منع التمدد غير المنطقي */
        }

        /* رأس الدردشة */
        .chat-header {
            height: 60px; padding: 0 15px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0;
        }

        .menu-btn {
            display: none; background: none; border: none;
            color: white; font-size: 1.2rem; cursor: pointer;
        }

        /* منطقة الرسائل */
        #chatMessages {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            background-image: radial-gradient(circle, #1e293b 1px, transparent 1px);
            background-size: 20px 20px; /* تنقيط خفيف للخلفية */
        }

        /* فقاعات الرسائل */
        .msg { max-width: 85%; display: flex; flex-direction: column; margin-bottom: 2px; }
        .msg.mine { align-self: flex-end; }
        .msg.others { align-self: flex-start; }

        .msg-bubble {
            padding: 8px 14px; border-radius: 18px; font-size: 0.9rem;
            line-height: 1.4; position: relative;
        }
        .mine .msg-bubble { background: var(--mine-msg); border-bottom-right-radius: 4px; }
        .others .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        
        .msg-info { font-size: 0.65rem; margin-top: 3px; display: flex; gap: 5px; opacity: 0.8; }
        .mine .msg-info { justify-content: flex-end; }

        /* --- منطقة الكتابة (ثابتة تماماً) --- */
        .input-area {
            padding: 10px 15px; background: #1e293b;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-box {
            display: flex; gap: 10px; align-items: center;
            max-width: 1000px; margin: 0 auto;
        }
        #msgInput {
            flex: 1; background: #0f172a; border: 1px solid var(--border);
            border-radius: 20px; padding: 10px 15px; color: white;
            outline: none; font-size: 16px; /* منع الـ Zoom في الآيفون */
        }
        .send-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--primary); border: none; color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
        }

        /* --- تعديلات الهاتف --- */
        @media (max-width: 768px) {
            .players-sidebar {
                position: absolute; right: -100%; top: 0; bottom: 0;
                width: 250px; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            }
            .players-sidebar.active { right: 0; }
            .menu-btn { display: block; }
            .msg { max-width: 90%; }
            .input-area { padding-bottom: 25px; } /* مساحة إضافية لأزرار التنقل */
        }

        /* ستايل قائمة اللاعبين */
        .player-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .player-item.active { background: rgba(14, 165, 233, 0.2); }
        .p-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="players-sidebar" id="sidebar">
        <div style="padding: 20px; font-weight: bold; border-bottom: 1px solid var(--border);">
            اللاعبون المتصلون
        </div>
        <div id="playersList" style="flex:1; overflow-y:auto;">
            </div>
        <a href="index.html" style="padding: 15px; color: var(--primary); text-decoration: none; text-align: center; border-top: 1px solid var(--border);">
            <i class="fas fa-arrow-right"></i> العودة للرئيسية
        </a>
    </aside>

    <main class="chat-main">
        <header class="chat-header">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-users"></i></button>
            <img id="headerImg" src="https://cdn-icons-png.flaticon.com/512/1165/1165248.png" style="width:30px; height:30px; border-radius:50%;">
            <div style="font-weight: bold; font-size: 0.9rem;" id="headerName">الدردشة العامة</div>
        </header>

        <div id="chatMessages">
            </div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="اكتب رسالة..." autocomplete="off">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    let currentUserData = null;
    let currentChatMode = "global"; 
    let unsubscribeMessages = null;

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    async function init() {
        const loggedPlayer = localStorage.getItem("activePlayer");
        if (!loggedPlayer) { window.location.href = "login.html"; return; }

        const snap = await db.collection("teams").where("playerTeamName", "==", loggedPlayer).get();
        if (!snap.empty) {
            currentUserData = snap.docs[0].data();
            currentUserData.id = snap.docs[0].id;
            loadPlayers();
            loadMessages();
        }
    }

    function loadPlayers() {
        db.collection("teams").onSnapshot(snap => {
            const list = document.getElementById("playersList");
            list.innerHTML = `
                <div class="player-item ${currentChatMode === 'global' ? 'active' : ''}" onclick="switchChat('global', 'الدردشة العامة', 'https://cdn-icons-png.flaticon.com/512/1165/1165248.png')">
                    <img src="https://cdn-icons-png.flaticon.com/512/1165/1165248.png" class="p-img">
                    <span>الدردشة العامة</span>
                </div>`;

            snap.forEach(doc => {
                const p = doc.data();
                if (p.playerTeamName !== currentUserData.playerTeamName) {
                    list.innerHTML += `
                        <div class="player-item ${currentChatMode === doc.id ? 'active' : ''}" onclick="switchChat('${doc.id}', '${p.playerTeamName}', '${p.clubLogo}')">
                            <img src="${p.clubLogo || 'https://via.placeholder.com/35'}" class="p-img">
                            <span>${p.playerTeamName}</span>
                        </div>`;
                }
            });
        });
    }

    function switchChat(id, name, img) {
        currentChatMode = id;
        document.getElementById("headerName").innerText = name;
        document.getElementById("headerImg").src = img;
        if(window.innerWidth < 768) toggleMenu();
        loadMessages();
    }

    async function sendMessage() {
        const val = document.getElementById("msgInput").value.trim();
        if (!val || !currentUserData) return;

        const data = {
            text: val,
            senderId: currentUserData.id,
            senderName: currentUserData.playerTeamName,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (currentChatMode === "global") {
            await db.collection("global_chat").add(data);
        } else {
            data.chatPath = [currentUserData.id, currentChatMode].sort().join("_");
            await db.collection("private_chats").add(data);
        }
        document.getElementById("msgInput").value = "";
    }

    function loadMessages() {
        if (unsubscribeMessages) unsubscribeMessages();

        let query = db.collection("global_chat").orderBy("timestamp", "asc");
        if (currentChatMode !== "global") {
            const path = [currentUserData.id, currentChatMode].sort().join("_");
            query = db.collection("private_chats").where("chatPath", "==", path).orderBy("timestamp", "asc");
        }

        unsubscribeMessages = query.onSnapshot(snap => {
            const box = document.getElementById("chatMessages");
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isMine = m.senderId === currentUserData.id;
                const time = m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";

                box.innerHTML += `
                    <div class="msg ${isMine ? 'mine' : 'others'}">
                        ${!isMine && currentChatMode === 'global' ? `<span style="font-size:0.7rem; color:var(--primary); margin-bottom:2px;">${m.senderName}</span>` : ''}
                        <div class="msg-bubble">${m.text}</div>
                        <div class="msg-info"><span>${time}</span></div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    // التعرف على ضغطة Enter
    document.getElementById("msgInput").addEventListener("keypress", (e) => {
        if(e.key === "Enter") sendMessage();
    });

    init();
</script>

</body>
</html>
