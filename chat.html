<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMPIONS LEAGUE DZ | الدردشة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --mine-msg: #0284c7;
            --other-msg: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg); color: var(--text);
            overflow: hidden;
        }

        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* --- القائمة الجانبية (تصميم صغير وجميل) --- */
        .players-sidebar {
            width: 260px; background: var(--sidebar-bg);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3000;
        }

        .sidebar-header {
            padding: 15px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* زر الإغلاق داخل القائمة */
        .close-sidebar {
            background: rgba(239, 68, 68, 0.1); color: #ef4444;
            border: none; width: 30px; height: 30px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* --- منطقة الدردشة --- */
        .chat-main {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg); position: relative; min-width: 0;
        }

        .chat-header {
            height: 60px; padding: 0 15px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }

        .menu-btn {
            background: var(--primary); color: white; border: none;
            width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        #chatMessages {
            flex: 1; overflow-y: auto; padding: 15px 15px 100px; /* مسافة إضافية في الأسفل للكتابة */
            display: flex; flex-direction: column; gap: 10px;
        }

        /* --- فقاعات الرسائل --- */
        .msg { max-width: 80%; display: flex; flex-direction: column; }
        .msg.mine { align-self: flex-end; }
        .msg.others { align-self: flex-start; }

        .msg-bubble {
            padding: 10px 14px; border-radius: 18px; font-size: 0.9rem;
            line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .mine .msg-bubble { background: var(--mine-msg); border-bottom-right-radius: 4px; }
        .others .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }

        /* --- خانة الكتابة (موقع ثابت وجميل) --- */
        .input-wrapper {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 15px; background: linear-gradient(transparent, var(--bg) 40%);
            pointer-events: none; /* للسماح بالضغط على الرسائل خلف التدرج */
        }

        .input-container {
            max-width: 800px; margin: 0 auto;
            background: #1e293b; border: 1px solid var(--border);
            border-radius: 25px; padding: 5px 5px 5px 15px;
            display: flex; align-items: center; gap: 10px;
            pointer-events: auto; /* إعادة تفعيل الضغط */
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        #msgInput {
            flex: 1; background: none; border: none; color: white;
            padding: 10px 0; outline: none; font-size: 16px;
        }

        .send-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--primary); border: none; color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }

        /* --- تعديلات الهاتف --- */
        @media (max-width: 768px) {
            .players-sidebar {
                position: absolute; right: 0; top: 0; bottom: 0;
                transform: translateX(100%); /* مخفية افتراضياً */
            }
            .players-sidebar.active { transform: translateX(0); }
            .input-wrapper { padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        }

        .player-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px; cursor: pointer; transition: 0.2s;
        }
        .player-item:hover { background: rgba(255,255,255,0.05); }
        .player-item.active { background: rgba(14, 165, 233, 0.15); color: var(--primary); }
        .p-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="players-sidebar" id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: bold; font-size: 0.9rem;">قائمة اللاعبين</span>
            <button class="close-sidebar" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
        </div>
        <div id="playersList" style="flex:1; overflow-y:auto;">
            </div>
        <div style="padding: 15px;">
            <a href="index.html" style="display: block; text-align: center; color: var(--text-muted); text-decoration: none; font-size: 0.8rem;">
                <i class="fas fa-home"></i> العودة للرئيسية
            </a>
        </div>
    </aside>

    <main class="chat-main">
        <header class="chat-header">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-users-cog"></i></button>
            <img id="headerImg" src="https://cdn-icons-png.flaticon.com/512/1165/1165248.png" style="width:32px; height:32px; border-radius:50%;">
            <div id="headerName" style="font-weight: bold; font-size: 0.9rem;">الدردشة العامة</div>
        </header>

        <div id="chatMessages">
            </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="msgInput" placeholder="اكتب رسالة..." autocomplete="off">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    let currentUserData = null;
    let currentChatMode = "global"; 
    let unsubscribeMessages = null;

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    async function init() {
        const loggedPlayer = localStorage.getItem("activePlayer");
        if (!loggedPlayer) { window.location.href = "login.html"; return; }

        const snap = await db.collection("teams").where("playerTeamName", "==", loggedPlayer).get();
        if (!snap.empty) {
            currentUserData = snap.docs[0].data();
            currentUserData.id = snap.docs[0].id;
            loadPlayers();
            loadMessages();
        }
    }

    function loadPlayers() {
        db.collection("teams").onSnapshot(snap => {
            const list = document.getElementById("playersList");
            list.innerHTML = `
                <div class="player-item ${currentChatMode === 'global' ? 'active' : ''}" onclick="switchChat('global', 'الدردشة العامة', 'https://cdn-icons-png.flaticon.com/512/1165/1165248.png')">
                    <img src="https://cdn-icons-png.flaticon.com/512/1165/1165248.png" class="p-img">
                    <div style="font-size: 0.85rem;">الدردشة العامة</div>
                </div>`;

            snap.forEach(doc => {
                const p = doc.data();
                if (p.playerTeamName !== currentUserData.playerTeamName) {
                    list.innerHTML += `
                        <div class="player-item ${currentChatMode === doc.id ? 'active' : ''}" onclick="switchChat('${doc.id}', '${p.playerTeamName}', '${p.clubLogo}')">
                            <img src="${p.clubLogo || 'https://via.placeholder.com/35'}" class="p-img">
                            <div style="font-size: 0.85rem;">${p.playerTeamName}</div>
                        </div>`;
                }
            });
        });
    }

    function switchChat(id, name, img) {
        currentChatMode = id;
        document.getElementById("headerName").innerText = name;
        document.getElementById("headerImg").src = img;
        if(window.innerWidth < 768) toggleMenu();
        loadMessages();
    }

    async function sendMessage() {
        const val = document.getElementById("msgInput").value.trim();
        if (!val || !currentUserData) return;

        const data = {
            text: val,
            senderId: currentUserData.id,
            senderName: currentUserData.playerTeamName,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (currentChatMode === "global") {
            await db.collection("global_chat").add(data);
        } else {
            data.chatPath = [currentUserData.id, currentChatMode].sort().join("_");
            await db.collection("private_chats").add(data);
        }
        document.getElementById("msgInput").value = "";
    }

    function loadMessages() {
        if (unsubscribeMessages) unsubscribeMessages();

        let query = db.collection("global_chat").orderBy("timestamp", "asc");
        if (currentChatMode !== "global") {
            const path = [currentUserData.id, currentChatMode].sort().join("_");
            query = db.collection("private_chats").where("chatPath", "==", path).orderBy("timestamp", "asc");
        }

        unsubscribeMessages = query.onSnapshot(snap => {
            const box = document.getElementById("chatMessages");
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isMine = m.senderId === currentUserData.id;
                const time = m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";

                box.innerHTML += `
                    <div class="msg ${isMine ? 'mine' : 'others'}">
                        ${!isMine && currentChatMode === 'global' ? `<span style="font-size:0.7rem; color:var(--primary); margin-bottom:2px; margin-right:8px;">${m.senderName}</span>` : ''}
                        <div class="msg-bubble">${m.text}</div>
                        <div style="font-size: 0.6rem; opacity: 0.5; margin: 2px 5px;">${time}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById("msgInput").addEventListener("keypress", (e) => {
        if(e.key === "Enter") sendMessage();
    });

    init();
</script>
</body>
</html>
