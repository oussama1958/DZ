<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMPIONS LEAGUE DZ | غرفة الدردشة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.95);
            --sidebar-bg: #16213e;
            --text: #f8fafc;
            --border: rgba(51, 65, 85, 0.6);
            --accent: #fbbf24;
        }

        * { box-sizing: border-box; transition: none; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; /* منع الصفحة كاملة من التمرير العشوائي */
        }

        /* الحاوية الرئيسية تأخذ كامل طول الشاشة المتاح */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
        }

        /* الهيدر ثابت */
        .chat-header {
            height: 60px;
            background: rgba(14, 165, 233, 0.15);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 0;
            position: relative;
            z-index: 10;
        }

        /* منطقة الرسائل تأخذ المساحة المتبقية فقط وتسمح بالتمرير */
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--card-bg);
            -webkit-overflow-scrolling: touch;
        }

        /* فقاعات الرسائل */
        .msg { display: flex; gap: 10px; max-width: 85%; margin-bottom: 5px; }
        .msg.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-text { 
            padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; 
            background: rgba(255,255,255,0.08); border: 1px solid var(--border);
        }
        .mine .msg-text { background: var(--primary); color: white; border: none; }
        .msg-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }

        /* منطقة الكتابة: الأهم هنا هو الحفاظ على مكانها */
        .chat-input-area {
            background: #1e293b;
            padding: 12px 15px;
            border-top: 2px solid var(--primary);
            display: flex;
            gap: 10px;
            flex-shrink: 0; /* يمنعها من الانضغاط */
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* دعم لهواتف النوتش */
        }

        #msgInput {
            flex: 1;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 12px 18px;
            color: white;
            outline: none;
            font-size: 16px; /* 16px تمنع المتصفح من عمل Zoom تلقائي عند الكتابة */
        }

        .send-btn {
            width: 48px; height: 48px;
            background: var(--primary);
            color: white; border: none;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Sidebar Toggle */
        .menu-btn { position: absolute; left: 15px; background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header class="chat-header">
        <button class="menu-btn" onclick="location.href='index.html'"><i class="fas fa-home"></i></button>
        <h2 style="margin:0; font-size:1rem; color:var(--primary);">دردشة الأبطال</h2>
    </header>

    <div id="chatMessages">
        </div>

    <div class="chat-input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();
    let currentUserData = null;

    async function checkAuth() {
        const loggedPlayer = localStorage.getItem("activePlayer");
        if (loggedPlayer) {
            const snap = await db.collection("teams").where("playerTeamName", "==", loggedPlayer).get();
            if (!snap.empty) {
                currentUserData = snap.docs[0].data();
            }
        } else {
            document.getElementById("msgInput").placeholder = "يجب تسجيل الدخول...";
            document.getElementById("msgInput").disabled = true;
        }
    }

    async function sendMessage() {
        const text = document.getElementById("msgInput").value.trim();
        if (!text || !currentUserData) return;
        try {
            await db.collection("global_chat").add({
                text: text,
                senderName: currentUserData.playerTeamName,
                senderLogo: currentUserData.clubLogo,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("msgInput").value = "";
            scrollToBottom();
        } catch (e) { console.error(e); }
    }

    function scrollToBottom() {
        const chatBox = document.getElementById("chatMessages");
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function loadMessages() {
        db.collection("global_chat").orderBy("timestamp", "asc").onSnapshot(snapshot => {
            const chatBox = document.getElementById("chatMessages");
            chatBox.innerHTML = "";
            snapshot.forEach(doc => {
                const m = doc.data();
                const isMine = m.senderName === (currentUserData ? currentUserData.playerTeamName : "");
                chatBox.innerHTML += `
                    <div class="msg ${isMine ? 'mine' : ''}">
                        <img src="${m.senderLogo || 'https://via.placeholder.com/40'}" class="msg-img">
                        <div class="msg-text">${m.text}</div>
                    </div>`;
            });
            scrollToBottom();
        });
    }

    // التعامل مع الـ Enter في الكيبورد
    document.getElementById("msgInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    checkAuth().then(() => { loadMessages(); });
</script>
</body>
</html>
