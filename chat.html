<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHAMPIONS LEAGUE DZ | الدردشة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0f172a;
            --sidebar-chat: #1e293b;
            --chat-bg: #0f172a;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --accent: #fbbf24;
            --mine-msg: #0284c7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; overflow: hidden;
        }

        /* --- القائمة الجانبية للاعبين (على اليسار) --- */
        .players-sidebar {
            width: 300px; background: var(--sidebar-chat);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
            z-index: 10;
        }

        .sidebar-header-title {
            padding: 20px; font-weight: bold; font-size: 1.1rem;
            border-bottom: 1px solid var(--border); color: var(--primary);
            display: flex; justify-content: space-between; align-items: center;
        }

        .players-list { flex: 1; overflow-y: auto; }
        
        .player-item {
            display: flex; align-items: center; gap: 12px;
            padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .player-item:hover { background: rgba(255,255,255,0.05); }
        .player-item.active { background: rgba(14, 165, 233, 0.2); border-right: 3px solid var(--primary); }
        
        .player-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #fff; }
        .player-info { display: flex; flex-direction: column; }
        .player-name { font-weight: 500; font-size: 0.95rem; }
        .player-status { font-size: 0.75rem; color: #10b981; }

        /* --- منطقة الدردشة الرئيسية --- */
        .main-chat {
            flex: 1; display: flex; flex-direction: column;
            background: var(--chat-bg); position: relative;
        }

        .chat-top-bar {
            padding: 15px 25px; background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 15px;
        }

        #chatMessages {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* خلفية خفيفة مثل تيليجرام */
        }

        /* --- فقاعات الرسائل (نظام تيليجرام) --- */
        .msg { max-width: 70%; display: flex; flex-direction: column; position: relative; margin-bottom: 4px; }
        .msg.mine { align-self: flex-end; }
        .msg.others { align-self: flex-start; }

        .msg-bubble {
            padding: 8px 14px; border-radius: 15px; font-size: 0.95rem;
            position: relative; line-height: 1.4;
        }
        .mine .msg-bubble { background: var(--mine-msg); color: white; border-bottom-right-radius: 2px; }
        .others .msg-bubble { background: #334155; color: white; border-bottom-left-radius: 2px; }

        .msg-time { font-size: 0.65rem; opacity: 0.7; margin-top: 2px; align-self: flex-end; }
        .msg-sender-name { font-size: 0.75rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }

        /* --- خانة الكتابة الثابتة في الأسفل --- */
        .input-wrapper {
            padding: 15px 20px; background: var(--sidebar-chat);
            border-top: 1px solid var(--border);
        }
        .input-container {
            max-width: 800px; margin: 0 auto;
            display: flex; gap: 10px; align-items: center;
        }
        #msgInput {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            border-radius: 25px; padding: 12px 20px; color: white;
            outline: none; font-size: 0.95rem;
        }
        .send-btn {
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--primary); border: none; color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }

        /* التجاوب مع الهاتف */
        @media (max-width: 768px) {
            .players-sidebar { width: 70px; }
            .player-info, .sidebar-header-title span { display: none; }
            .player-item { padding: 15px 10px; justify-content: center; }
            .msg { max-width: 85%; }
        }
    </style>
</head>
<body>

    <aside class="players-sidebar">
        <div class="sidebar-header-title">
            <span>اللاعبون</span>
            <i class="fas fa-users"></i>
        </div>
        <div class="players-list" id="playersList">
            <div class="player-item active" onclick="switchChat('global')">
                <img src="https://cdn-icons-png.flaticon.com/512/1165/1165248.png" class="player-img">
                <div class="player-info">
                    <span class="player-name">الدردشة العامة</span>
                    <span class="player-status">مفتوحة للجميع</span>
                </div>
            </div>
            </div>
    </aside>

    <main class="main-chat">
        <div class="chat-top-bar">
            <img id="currentChatImg" src="https://cdn-icons-png.flaticon.com/512/1165/1165248.png" style="width: 35px; border-radius: 50%;">
            <div class="chat-info">
                <div id="currentChatName" style="font-weight: bold;">الدردشة العامة</div>
                <div id="chatStatus" style="font-size: 0.75rem; color: var(--text-muted);">...</div>
            </div>
        </div>

        <div id="chatMessages">
            </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    let currentUserData = null;
    let currentChatMode = "global"; // "global" أو معرف اللاعب للخاص
    let unsubscribeMessages = null;

    async function init() {
        const loggedPlayer = localStorage.getItem("activePlayer");
        if (loggedPlayer) {
            const snap = await db.collection("teams").where("playerTeamName", "==", loggedPlayer).get();
            if (!snap.empty) {
                currentUserData = snap.docs[0].data();
                currentUserData.id = snap.docs[0].id;
                loadPlayers();
                loadMessages();
            }
        } else {
            window.location.href = "login.html";
        }
    }

    // تحميل قائمة اللاعبين في القائمة اليسرى
    function loadPlayers() {
        db.collection("teams").onSnapshot(snap => {
            const list = document.getElementById("playersList");
            // نحتفظ بأول عنصر (العامة)
            list.innerHTML = `
                <div class="player-item ${currentChatMode === 'global' ? 'active' : ''}" onclick="switchChat('global')">
                    <img src="https://cdn-icons-png.flaticon.com/512/1165/1165248.png" class="player-img">
                    <div class="player-info">
                        <span class="player-name">الدردشة العامة</span>
                        <span class="player-status">مفتوحة</span>
                    </div>
                </div>`;

            snap.forEach(doc => {
                const p = doc.data();
                if (p.playerTeamName !== currentUserData.playerTeamName) {
                    list.innerHTML += `
                        <div class="player-item ${currentChatMode === doc.id ? 'active' : ''}" onclick="switchChat('${doc.id}', '${p.playerTeamName}', '${p.clubLogo}')">
                            <img src="${p.clubLogo || 'https://via.placeholder.com/45'}" class="player-img">
                            <div class="player-info">
                                <span class="player-name">${p.playerTeamName}</span>
                                <span class="player-status" style="color:var(--text-muted)">خاص</span>
                            </div>
                        </div>`;
                }
            });
        });
    }

    // التبديل بين العام والخاص
    function switchChat(chatId, name = "الدردشة العامة", logo = "https://cdn-icons-png.flaticon.com/512/1165/1165248.png") {
        currentChatMode = chatId;
        document.getElementById("currentChatName").innerText = name;
        document.getElementById("currentChatImg").src = logo;
        
        // تحديث حالة النشط في القائمة
        document.querySelectorAll('.player-item').forEach(el => el.classList.remove('active'));
        
        loadMessages();
    }

    async function sendMessage() {
        const text = document.getElementById("msgInput").value.trim();
        if (!text || !currentUserData) return;

        const msgData = {
            text: text,
            senderId: currentUserData.id,
            senderName: currentUserData.playerTeamName,
            senderLogo: currentUserData.clubLogo,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        let collectionName = "global_chat";
        if (currentChatMode !== "global") {
            collectionName = "private_chats";
            msgData.chatPath = [currentUserData.id, currentChatMode].sort().join("_");
        }

        await db.collection(collectionName).add(msgData);
        document.getElementById("msgInput").value = "";
    }

    function loadMessages() {
        if (unsubscribeMessages) unsubscribeMessages();

        let query = db.collection("global_chat").orderBy("timestamp", "asc");
        
        if (currentChatMode !== "global") {
            const path = [currentUserData.id, currentChatMode].sort().join("_");
            query = db.collection("private_chats")
                      .where("chatPath", "==", path)
                      .orderBy("timestamp", "asc");
        }

        unsubscribeMessages = query.onSnapshot(snap => {
            const chatBox = document.getElementById("chatMessages");
            chatBox.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isMine = m.senderName === currentUserData.playerTeamName;
                const time = m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";

                chatBox.innerHTML += `
                    <div class="msg ${isMine ? 'mine' : 'others'}">
                        ${!isMine && currentChatMode === 'global' ? `<span class="msg-sender-name">${m.senderName}</span>` : ''}
                        <div class="msg-bubble">
                            ${m.text}
                            <div class="msg-time">${time}</div>
                        </div>
                    </div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    init();
</script>
</body>
</html>
