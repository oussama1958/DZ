<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZ دوري | ترتيب البطولات</title>
    
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --sidebar-bg: #16213e;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --accent: #fbbf24;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* --- Sidebar & Overlay --- */
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: var(--shadow);
            font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        .sidebar {
            position: fixed;
            top: 0; right: -320px;
            width: 300px; height: 100%;
            background: var(--sidebar-bg);
            z-index: 9999;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            border-left: 4px solid var(--primary);
            padding: 40px 20px;
            display: flex; flex-direction: column;
        }

        .sidebar.active { right: 0; }

        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 9998;
            display: none;
        }
        .overlay.active { display: block; }

        /* --- User Profile Section --- */
        .sidebar-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .user-nav-img {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 10px;
            background: #fff;
        }

        .nav-links { list-style: none; padding: 0; }
        .nav-item {
            color: var(--text);
            text-decoration: none;
            padding: 12px 15px;
            display: block;
            border-radius: 10px;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .nav-item:hover { background: rgba(14, 165, 233, 0.2); color: var(--primary); transform: translateX(-5px); }
        .dropdown-title { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; margin: 15px 0 5px; display: block; }

        /* --- Header & Buttons --- */
        .header {
            padding: 100px 20px 50px;
            text-align: center;
        }

        .header h1 {
            font-size: 3.5rem;
            margin: 0 0 20px;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #64748b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .switch-container {
            display: inline-flex;
            background: rgba(15, 23, 42, 0.8);
            padding: 6px;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .switch-btn {
            background: transparent; border: none;
            padding: 12px 30px;
            color: var(--text-muted);
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
        }

        .switch-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        /* --- Table Styling --- */
        .container { max-width: 1000px; margin: 0 auto 50px; padding: 0 20px; }

        .table-wrapper {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td { padding: 16px; text-align: center; border-bottom: 1px solid var(--border); }
        tr:hover td { background: rgba(255, 255, 255, 0.03); }

        .team-cell { display: flex; align-items: center; gap: 12px; text-align: right; }
        .team-logo { width: 32px; height: 32px; border-radius: 6px; background: white; padding: 2px; }

        .rank-circle {
            width: 28px; height: 28px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 8px; background: #334155; font-weight: bold;
        }

        tr:nth-child(1) .rank-circle { background: var(--accent); color: #000; }
        .points-cell { font-weight: 800; color: var(--primary); font-size: 1.1rem; }

        .league-section { display: none; }
        .league-section.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.2rem; }
            .hide-mobile { display: none; }
            .container { padding: 0 10px; }
        }
    </style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header" id="userProfileNav">
        <div id="userInfo" style="display: none; flex-direction: column; align-items: center;">
            <img id="navUserImg" src="" class="user-nav-img">
            <span id="navUserName" style="font-weight: bold; color: var(--accent);"></span>
            <a href="#" onclick="logout()" style="color:var(--danger); font-size:0.8rem; text-decoration:none; margin-top:8px;">خروج ←</a>
        </div>
        <div id="authAction"></div>
    </div>

    <div class="nav-links">
        <a class='nav-item' href='/'>🏠 الرئيسية</a>
        <a class='nav-item' href='/cup'>🏆 الكأس</a>
        <a class='nav-item' href='/ucl'>⚽ دوري الأبطال</a>
    </div>
</nav>

<div class="header">
    <h1>DZ دوري</h1>
    <div class="switch-container">
        <button class="switch-btn active" id="btn1" onclick="toggleLeague(1)">SC League</button>
        <button class="switch-btn" id="btn2" onclick="toggleLeague(2)">KC League</button>
    </div>
</div>

<div class="container">
    <div class="league-section active" id="view1">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: right;">الفريق</th>
                        <th>لعب</th>
                        <th class="hide-mobile">له</th>
                        <th class="hide-mobile">عليه</th>
                        <th>+/-</th>
                        <th>نقاط</th>
                    </tr>
                </thead>
                <tbody id="table1"></tbody>
            </table>
        </div>
    </div>

    <div class="league-section" id="view2">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: right;">الفريق</th>
                        <th>لعب</th>
                        <th class="hide-mobile">له</th>
                        <th class="hide-mobile">عليه</th>
                        <th>+/-</th>
                        <th>نقاط</th>
                    </tr>
                </thead>
                <tbody id="table2"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    // Config
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function toggleLeague(num) {
        document.querySelectorAll('.league-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view' + num).classList.add('active');
        document.getElementById('btn' + num).classList.add('active');
    }

    async function fetchLoggedUser() {
        const loggedPlayerName = localStorage.getItem("activePlayer");
        const authActionDiv = document.getElementById("authAction");
        const userInfoDiv = document.getElementById("userInfo");

        if (!loggedPlayerName) {
            authActionDiv.innerHTML = `<a href="login.html" class="nav-item" style="background:var(--primary); text-align:center; color:white;">🔐 دخول</a>`;
            return;
        }

        try {
            const snapshot = await db.collection("teams").where("playerTeamName", "==", loggedPlayerName).get();
            if (!snapshot.empty) {
                const data = snapshot.docs[0].data();
                userInfoDiv.style.display = "flex";
                document.getElementById("navUserName").innerText = data.playerTeamName;
                document.getElementById("navUserImg").src = data.clubLogo || 'https://via.placeholder.com/80';
            }
        } catch (e) { console.error(e); }
    }

    function loadLeagueData(col, targetId) {
        db.collection(col).onSnapshot(snapshot => {
            let teams = [];
            snapshot.forEach(doc => teams.push({ id: doc.id, ...doc.data() }));
            teams.sort((a, b) => (b.points || 0) - (a.points || 0));

            const tbody = document.getElementById(targetId);
            tbody.innerHTML = teams.map((t, i) => {
                const diff = (t.goalsFor || 0) - (t.goalsAgainst || 0);
                return `
                    <tr>
                        <td><span class="rank-circle">${i + 1}</span></td>
                        <td>
                            <div class="team-cell">
                                <img src="${t.logo || 'https://via.placeholder.com/32'}" class="team-logo">
                                <span>${t.name}</span>
                            </div>
                        </td>
                        <td>${t.played || 0}</td>
                        <td class="hide-mobile">${t.goalsFor || 0}</td>
                        <td class="hide-mobile">${t.goalsAgainst || 0}</td>
                        <td style="color:${diff > 0 ? 'var(--success)' : (diff < 0 ? 'var(--danger)' : 'inherit')}">
                            ${diff > 0 ? '+' + diff : diff}
                        </td>
                        <td class="points-cell">${t.points || 0}</td>
                    </tr>`;
            }).join('');
        });
    }

    function logout() {
        localStorage.removeItem("activePlayer");
        location.reload();
    }

    // Init
    fetchLoggedUser();
    loadLeagueData("league1", "table1");
    loadLeagueData("league2", "table2");
</script>
</body>
</html>
