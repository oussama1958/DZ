<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ترتيب البطولات | Live Standings</title>
    
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --gold: #fbbf24;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* رأس الصفحة والتبديل */
        .header {
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            margin: 0 0 20px 0;
            font-size: 1.8rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .switch-container {
            display: inline-flex;
            background: #020617;
            padding: 5px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .switch-btn {
            background: transparent;
            border: none;
            padding: 10px 25px;
            color: #94a3b8;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .switch-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px 50px;
        }

        .league-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .league-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تنسيق الجدول */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th {
            background: #334155;
            color: #94a3b8;
            font-weight: 600;
            padding: 15px 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 14px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }

        /* تمييز الفرق */
        .team-cell {
            display: flex;
            align-items: center;
            text-align: right;
            gap: 12px;
            padding-right: 15px;
        }

        .team-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #fff;
            object-fit: contain;
            padding: 2px;
        }

        .rank-circle {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.8rem;
            background: #334155;
        }

        /* ألوان المراكز الأولى */
        tr:nth-child(1) .rank-circle { background: #fbbf24; color: #78350f; }
        tr:nth-child(2) .rank-circle { background: #94a3b8; color: #1e293b; }
        tr:nth-child(3) .rank-circle { background: #a8a29e; color: #44403c; }

        .points-col {
            font-weight: 800;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .diff-positive { color: #10b981; }
        .diff-negative { color: #ef4444; }

        @media (max-width: 600px) {
            th:nth-child(4), td:nth-child(4), /* له */
            th:nth-child(5), td:nth-child(5)  /* عليه */ {
                display: none;
            }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>

<style>
    /* تنسيق شريط التنقل */
    :root {
        --nav-bg: #16213e;
        --nav-hover: #1e293b;
        --accent-color: #c39738; /* اللون الذهبي */
        --text-white: #f8fafc;
    }

    .main-nav {
        background-color: var(--nav-bg);
        padding: 10px 0;
        border-bottom: 3px solid var(--accent-color);
        position: sticky;
        top: 0;
        z-index: 9999;
        font-family: 'Cairo', sans-serif;
    }

    .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
    }

    .nav-logo {
        color: var(--accent-color);
        font-weight: 900;
        font-size: 1.5rem;
    }

    .nav-links {
        list-style: none;
        display: flex;
        gap: 15px;
        margin: 0;
        padding: 0;
    }

    .nav-item {
        color: var(--text-white);
        text-decoration: none;
        padding: 8px 15px;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
        font-size: 0.9rem;
    }

    .nav-item:hover {
        background: var(--nav-hover);
        color: var(--accent-color);
    }

    /* القائمة المنسدلة */
    .dropdown {
        position: relative;
        display: inline-block;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        background-color: var(--nav-bg);
        min-width: 160px;
        box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--accent-color);
        top: 100%;
        right: 0;
    }

    .dropdown-content a {
        color: white;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        font-size: 0.85rem;
    }

    .dropdown-content a:hover {
        background-color: var(--nav-hover);
        color: var(--accent-color);
    }

    .dropdown:hover .dropdown-content {
        display: block;
    }

    /* للجوال */
    @media (max-width: 768px) {
        .nav-container { flex-direction: column; gap: 10px; }
        .nav-links { flex-wrap: wrap; justify-content: center; }
    }
</style>

<div class="header">
    <h1>DZ دوري </h1>
    <div class="switch-container">
        <button class="switch-btn active" id="btn1" onclick="toggleLeague(1)">SC League</button>
        <button class="switch-btn" id="btn2" onclick="toggleLeague(2)">KC League</button>
    </div>
</div>

<div class="container">
    <div class="league-section active" id="view1">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: right;">الفريق</th>
                        <th>لعب</th>
                        <th>له</th>
                        <th>عليه</th>
                        <th>+/-</th>
                        <th>نقاط</th>
                    </tr>
                </thead>
                <tbody id="table1">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="league-section" id="view2">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: right;">الفريق</th>
                        <th>لعب</th>
                        <th>له</th>
                        <th>عليه</th>
                        <th>+/-</th>
                        <th>نقاط</th>
                    </tr>
                </thead>
                <tbody id="table2">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });

    const db = firebase.firestore();

    function loadLeagueData(col, targetId) {
        db.collection(col).onSnapshot(snapshot => {
            let teams = [];
            snapshot.forEach(doc => teams.push({ id: doc.id, ...doc.data() }));

            // ترتيب احترافي: نقاط > فارق أهداف > أهداف مسجلة
            teams.sort((a, b) => {
                if ((b.points || 0) !== (a.points || 0)) return (b.points || 0) - (a.points || 0);
                let diffA = (a.goalsFor || 0) - (a.goalsAgainst || 0);
                let diffB = (b.goalsFor || 0) - (b.goalsAgainst || 0);
                if (diffB !== diffA) return diffB - diffA;
                return (b.goalsFor || 0) - (a.goalsFor || 0);
            });

            const tbody = document.getElementById(targetId);
            tbody.innerHTML = "";

            teams.forEach((t, i) => {
                const diff = (t.goalsFor || 0) - (t.goalsAgainst || 0);
                const diffClass = diff > 0 ? 'diff-positive' : (diff < 0 ? 'diff-negative' : '');
                
                tbody.innerHTML += `
                    <tr>
                        <td><span class="rank-circle">${i + 1}</span></td>
                        <td>
                            <div class="team-cell">
                                <img src="${t.logo}" class="team-logo" onerror="this.src='https://via.placeholder.com/32'">
                                <span>${t.name}</span>
                            </div>
                        </td>
                        <td>${t.played || 0}</td>
                        <td>${t.goalsFor || 0}</td>
                        <td>${t.goalsAgainst || 0}</td>
                        <td class="${diffClass}">${diff > 0 ? '+' + diff : diff}</td>
                        <td class="points-col">${t.points || 0}</td>
                    </tr>
                `;
            });
        });
    }

    // تبديل العرض بين البطولتين
    function toggleLeague(num) {
        document.querySelectorAll('.league-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById('view' + num).classList.add('active');
        document.getElementById('btn' + num).classList.add('active');
    }

    // بدء التحميل
    loadLeagueData("league1", "table1");
    loadLeagueData("league2", "table2");
</script>
