<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DZ دوري | ترتيب البطولات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --sidebar-bg: #16213e;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --accent: #fbbf24;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            color: var(--text);
            line-height: 1.4;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Sidebar & Overlay --- */
        .menu-toggle {
            position: fixed; top: 15px; right: 15px; z-index: 1001;
            background: var(--primary); color: white; border: none;
            width: 42px; height: 42px; border-radius: 10px;
            cursor: pointer; box-shadow: var(--shadow);
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        }

        .sidebar {
            position: fixed; top: 0; right: -280px;
            width: 260px; height: 100%;
            background: var(--sidebar-bg); z-index: 9999;
            border-left: 3px solid var(--primary);
            padding: 30px 15px; display: flex; flex-direction: column;
        }

        .sidebar.active { right: 0; }

        .overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px); z-index: 9998; display: none;
        }
        .overlay.active { display: block; }

        .sidebar-header { text-align: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .user-nav-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 8px; background: #fff; object-fit: cover; }

        .nav-item {
            color: var(--text); text-decoration: none; padding: 10px 12px;
            display: flex; align-items: center; gap: 10px;
            border-radius: 8px; margin-bottom: 4px; font-weight: 500; font-size: 0.9rem;
        }
        .nav-item:hover, .nav-item.active-link { background: rgba(14, 165, 233, 0.15); color: var(--primary); }

        /* --- Header & Buttons --- */
        .header { padding: 70px 15px 30px; text-align: center; }
        .header h1 {
            font-size: 1.8rem; margin: 0 0 15px; color: white;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .switch-container {
            display: inline-flex; background: rgba(15, 23, 42, 0.8);
            padding: 4px; border-radius: 12px; border: 1px solid var(--border);
        }

        .switch-btn {
            background: transparent; border: none; padding: 8px 20px;
            color: var(--text-muted); border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.85rem;
        }
        .switch-btn.active { background: var(--primary); color: white; }

        /* --- Table Styling --- */
        .container { max-width: 1000px; margin: 0 auto 40px; padding: 0 10px; }
        .table-wrapper {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 15px; border: 1px solid var(--border);
            overflow: hidden; box-shadow: var(--shadow);
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { padding: 12px 8px; font-size: 0.7rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 10px 8px; text-align: center; border-bottom: 1px solid var(--border); }

        .team-cell { display: flex; align-items: center; gap: 8px; text-align: right; }
        .team-logo { width: 24px; height: 24px; border-radius: 4px; background: white; object-fit: contain; }
        .team-name-text { max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .rank-circle {
            width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center;
            border-radius: 6px; background: #334155; font-weight: bold; font-size: 0.75rem;
        }
        tr:nth-child(1) .rank-circle { background: var(--accent); color: #000; }
        .points-cell { font-weight: 800; color: var(--primary); font-size: 1rem; }

        /* --- Floating Chat Button --- */
        .floating-chat {
            position: fixed; bottom: 20px; left: 20px;
            width: 50px; height: 50px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.2rem; text-decoration: none;
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4); z-index: 1000;
        }

        .league-section { display: none; }
        .league-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Mobile Specific Fixes --- */
        @media (max-width: 480px) {
            th, td { padding: 8px 4px; }
            .team-name-text { max-width: 65px; }
            .hide-xs { display: none; } /* إخفاء أعمدة إضافية في الشاشات الصغيرة جداً */
        }
    </style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<a href="chat.html" class="floating-chat">
    <i class="fas fa-comments"></i>
</a>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header" id="userProfileNav">
        <div id="userInfo" style="display: none; flex-direction: column; align-items: center;">
            <img id="navUserImg" src="" class="user-nav-img">
            <span id="navUserName" style="font-weight: bold; color: var(--accent); font-size: 0.9rem;"></span>
            <a href="#" onclick="logout()" style="color:var(--danger); font-size:0.75rem; text-decoration:none; margin-top:8px;">خروج ←</a>
        </div>
        <div id="authAction"></div>
    </div>

    <div class="nav-links">
        <a class='nav-item active-link' href='index.html'><i class="fas fa-home"></i> الرئيسية</a>
        <a class='nav-item' href='chat.html'><i class="fas fa-comments"></i> الدردشة</a>
        <a class='nav-item' href='cup.html'><i class="fas fa-trophy"></i> الكأس</a>
        <a class='nav-item' href='ucl.html'><i class="fas fa-star"></i> دوري الأبطال</a>
        <a class='nav-item active-link' href='journalist.html'><i class="fas fa-bullhorn"></i> صحيفة البطولة</a>
    </div>
</nav>

<div class="header">
    <h1>DZ دوري</h1>
    <div class="switch-container">
        <button class="switch-btn active" id="btn1" onclick="toggleLeague(1)">SC League</button>
        <button class="switch-btn" id="btn2" onclick="toggleLeague(2)">KC League</button>
    </div>
</div>

<div class="container">
    <div class="league-section active" id="view1">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: right;">الفريق</th>
                        <th>لعب</th>
                        <th class="hide-mobile">له</th>
                        <th class="hide-mobile">عليه</th>
                        <th class="hide-xs">+/-</th>
                        <th>نقاط</th>
                    </tr>
                </thead>
                <tbody id="table1"></tbody>
            </table>
        </div>
    </div>

    <div class="league-section" id="view2">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: right;">الفريق</th>
                        <th>لعب</th>
                        <th class="hide-mobile">له</th>
                        <th class="hide-mobile">عليه</th>
                        <th class="hide-xs">+/-</th>
                        <th>نقاط</th>
                    </tr>
                </thead>
                <tbody id="table2"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function toggleLeague(num) {
        document.querySelectorAll('.league-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view' + num).classList.add('active');
        document.getElementById('btn' + num).classList.add('active');
    }

    async function fetchLoggedUser() {
        const loggedPlayerName = localStorage.getItem("activePlayer");
        const authActionDiv = document.getElementById("authAction");
        const userInfoDiv = document.getElementById("userInfo");

        if (!loggedPlayerName) {
            authActionDiv.innerHTML = `<a href="login.html" class="nav-item" style="background:var(--primary); justify-content:center; color:white; display:flex;">🔐 دخول</a>`;
            return;
        }

        try {
            const snapshot = await db.collection("teams").where("playerTeamName", "==", loggedPlayerName).get();
            if (!snapshot.empty) {
                const data = snapshot.docs[0].data();
                userInfoDiv.style.display = "flex";
                document.getElementById("navUserName").innerText = data.playerTeamName;
                document.getElementById("navUserImg").src = data.clubLogo || 'https://via.placeholder.com/80';
            }
        } catch (e) { console.error(e); }
    }

    function loadLeagueData(col, targetId) {
        db.collection(col).onSnapshot(snapshot => {
            let teams = [];
            snapshot.forEach(doc => teams.push({ id: doc.id, ...doc.data() }));
            
            teams.sort((a, b) => {
                if ((b.points || 0) !== (a.points || 0)) return (b.points || 0) - (a.points || 0);
                return ((b.goalsFor || 0) - (b.goalsAgainst || 0)) - ((a.goalsFor || 0) - (a.goalsAgainst || 0));
            });

            const tbody = document.getElementById(targetId);
            tbody.innerHTML = teams.map((t, i) => {
                const diff = (t.goalsFor || 0) - (t.goalsAgainst || 0);
                return `
                    <tr>
                        <td><span class="rank-circle">${i + 1}</span></td>
                        <td>
                            <div class="team-cell">
                                <img src="${t.logo || 'https://via.placeholder.com/32'}" class="team-logo">
                                <span class="team-name-text">${t.name}</span>
                            </div>
                        </td>
                        <td>${t.played || 0}</td>
                        <td class="hide-mobile">${t.goalsFor || 0}</td>
                        <td class="hide-mobile">${t.goalsAgainst || 0}</td>
                        <td class="hide-xs" style="color:${diff > 0 ? 'var(--success)' : (diff < 0 ? 'var(--danger)' : 'inherit')}">
                            ${diff > 0 ? '+' + diff : diff}
                        </td>
                        <td class="points-cell">${t.points || 0}</td>
                    </tr>`;
            }).join('');
        });
    }

    function logout() {
        localStorage.removeItem("activePlayer");
        location.reload();
    }

    fetchLoggedUser();
    loadLeagueData("league1", "table1");
    loadLeagueData("league2", "table2");
</script>
</body>
</html>
