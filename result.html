<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتائج المباريات | SC vs KC</title>
    <style>
        :root {
            --primary: #38bdf8; --accent: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        
        header { 
            text-align: center; padding: 25px; background: var(--card); 
            border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; 
        }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* نظام التبويب (Tabs) */
        .tabs-container {
            display: flex; gap: 10px; margin-bottom: 20px; background: var(--card);
            padding: 5px; border-radius: 12px; border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            background: transparent; color: #94a3b8; cursor: pointer;
            font-weight: bold; transition: 0.3s; font-size: 1rem;
        }
        .tab-btn.active {
            background: var(--accent); color: white;
        }

        .filter-section {
            background: var(--card); padding: 15px; border-radius: 12px; 
            margin-bottom: 20px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 15px;
        }
        select { 
            flex: 1; padding: 10px; background: #0f172a; border: 1px solid var(--border); 
            border-radius: 8px; color: white; cursor: pointer;
        }

        .match-card {
            background: var(--card); border-radius: 15px; padding: 20px;
            margin-bottom: 10px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s;
        }
        .match-card:hover { border-color: var(--primary); }
        
        .team-box { flex: 1; text-align: center; }
        .team-name { font-weight: bold; font-size: 1rem; }
        
        .score-display {
            flex: 0.5; display: flex; align-items: center; justify-content: center;
            gap: 10px; font-size: 1.8rem; font-weight: 900; color: var(--primary);
        }
        .score-box {
            background: #0f172a; padding: 5px 12px; border-radius: 8px;
            min-width: 35px; text-align: center; border: 1px solid var(--border);
        }

        .match-date { 
            text-align: center; font-size: 0.7rem; color: #64748b; margin-bottom: 20px;
        }

        .loader { border: 4px solid #334155; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>🏆 سجل نتائج المباريات</h1>
    <div class="container" style="margin: 15px auto 0;">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchLeague('league1', this)">SC League</button>
            <button class="tab-btn" onclick="switchLeague('league2', this)">KC League</button>
        </div>
    </div>
</header>

<div class="container">
    <div class="filter-section">
        <span>تصفية حسب الفريق:</span>
        <select id="teamFilter" onchange="renderMatches()">
            <option value="all">جميع الفرق</option>
        </select>
    </div>

    <div id="loading" class="loader"></div>
    <div id="resultsGrid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    let allMatches = [];
    let currentLeague = 'league1'; // القيمة الافتراضية

    // 1. تبديل الدوري
    function switchLeague(league, btn) {
        currentLeague = league;
        // تحديث شكل الأزرار
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // تحديث القائمة المنسدلة والنتائج
        populateFilter();
        renderMatches();
    }

    // 2. تحميل البيانات
    async function loadHistory() {
        try {
            const snap = await db.collection("matches_history").orderBy("date", "desc").get();
            allMatches = [];
            snap.forEach(doc => allMatches.push(doc.data()));

            populateFilter();
            renderMatches();
            document.getElementById("loading").style.display = "none";
        } catch (e) {
            console.error(e);
            document.getElementById("resultsGrid").innerHTML = "خطأ في تحميل البيانات";
        }
    }

    // 3. تعبئة قائمة الفرق (بناءً على الدوري المختار فقط)
    function populateFilter() {
        const select = document.getElementById("teamFilter");
        select.innerHTML = '<option value="all">جميع الفرق</option>';
        
        let teams = new Set();
        allMatches.forEach(m => {
            if(m.league === currentLeague) {
                if(m.t1Name) teams.add(m.t1Name);
                if(m.t2Name) teams.add(m.t2Name);
            }
        });

        Array.from(teams).sort().forEach(team => {
            const opt = document.createElement("option");
            opt.value = team;
            opt.innerText = team;
            select.appendChild(opt);
        });
    }

    // 4. عرض النتائج
    function renderMatches() {
        const grid = document.getElementById("resultsGrid");
        const filterValue = document.getElementById("teamFilter").value;
        grid.innerHTML = "";

        const filtered = allMatches.filter(m => {
            const isLeague = m.league === currentLeague;
            const isTeam = (filterValue === "all" || m.t1Name === filterValue || m.t2Name === filterValue);
            return isLeague && isTeam;
        });

        if (filtered.length === 0) {
            grid.innerHTML = "<div style='text-align:center; padding:20px; color:#64748b;'>لا توجد نتائج مسجلة لهذا القسم.</div>";
            return;
        }

        filtered.forEach(m => {
            const dateStr = m.date ? new Date(m.date.seconds * 1000).toLocaleString('ar-EG', { dateStyle: 'medium', timeStyle: 'short' }) : "";
            
            const item = document.createElement("div");
            item.innerHTML = `
                <div class="match-card">
                    <div class="team-box"><span class="team-name">${m.t1Name}</span></div>
                    <div class="score-display">
                        <div class="score-box">${m.g1}</div>
                        <span>-</span>
                        <div class="score-box">${m.g2}</div>
                    </div>
                    <div class="team-box"><span class="team-name">${m.t2Name}</span></div>
                </div>
                <div class="match-date">${dateStr}</div>
            `;
            grid.appendChild(item);
        });
    }

    loadHistory();
</script>
</body>
</html>
