<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | إدارة مباريات الكأس</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --cup: #fbbf24; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        header { text-align: center; padding: 20px; background: var(--card); border-bottom: 2px solid var(--cup); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 25px; }
        h2 { color: var(--cup); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        label { display: block; margin: 15px 0 5px; color: #94a3b8; }
        select, input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border); border-radius: 10px; color: white; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-cup { background: var(--cup); color: #1e293b; }
        .match-box { background: #0f172a; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }
        .flex { display: flex; gap: 10px; align-items: center; justify-content: center; }
        .admin-logo { width: 35px; height: 35px; object-fit: contain; background: white; border-radius: 50%; padding: 2px; }
        .match-item { margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    </style>
</head>
<body>

<header><h1>🏆 إدارة مباريات الكأس</h1></header>

<div class="container">
    <div class="card">
        <h2>⚽ إنشاء مواجهة جديدة</h2>
        <div class="flex">
            <div style="flex:1">
                <label>الفريق الأول</label>
                <select id="cupT1"></select>
            </div>
            <b style="margin-top:25px">VS</b>
            <div style="flex:1">
                <label>الفريق الثاني</label>
                <select id="cupT2"></select>
            </div>
        </div>
        
        <label>الدور الحالي</label>
        <select id="cupRound">
            <option value="round32">دور الـ 32</option>
            <option value="round16">دور الـ 16</option>
            <option value="round8">ربع النهائي</option>
            <option value="round4">نصف النهائي</option>
            <option value="round2">النهائي</option>
        </select>
        
        <button class="btn-cup" onclick="addCupMatch()">إضافة المباراة للجدول</button>
    </div>

    <div class="card">
        <h2>📝 نتائج وتعديلات المباريات</h2>
        <div id="cupMatchesAdmin"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();
    let allTeams = [];

    // تحميل الفرق من مجموعة teams لسحب الشعارات والأسماء
    function loadInitialData() {
        db.collection("teams").onSnapshot(snap => {
            allTeams = [];
            const c1 = document.getElementById("cupT1");
            const c2 = document.getElementById("cupT2");
            c1.innerHTML = c2.innerHTML = "";

            snap.forEach(doc => {
                const data = doc.data();
                allTeams.push({ id: doc.id, ...data });
                let opt = `<option value="${doc.id}">${data.playerTeamName}</option>`;
                c1.innerHTML += opt; 
                c2.innerHTML += opt;
            });
        });
    }

    // إضافة مباراة جديدة مع حفظ روابط الصور
    async function addCupMatch() {
        const t1Id = document.getElementById("cupT1").value;
        const t2Id = document.getElementById("cupT2").value;
        const round = document.getElementById("cupRound").value;

        if (t1Id === t2Id) {
            return Swal.fire('خطأ', 'لا يمكن اختيار نفس الفريق للمواجهة', 'error');
        }

        const t1 = allTeams.find(t => t.id === t1Id);
        const t2 = allTeams.find(t => t.id === t2Id);
        
        try {
            await db.collection("cup_matches").add({
                t1: { id: t1.id, name: t1.playerTeamName, logo: t1.clubLogo },
                t2: { id: t2.id, name: t2.playerTeamName, logo: t2.clubLogo },
                round: round,
                score1: 0,
                score2: 0,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            Swal.fire('تم الإضافة', 'تمت إضافة المواجهة بنجاح', 'success');
        } catch (error) {
            Swal.fire('خطأ', 'حدثت مشكلة أثناء الحفظ', 'error');
        }
    }

    // عرض المباريات المضافة للتحكم في نتائجها
    function loadCupAdmin() {
        db.collection("cup_matches").orderBy("timestamp", "desc").onSnapshot(snap => {
            const area = document.getElementById("cupMatchesAdmin");
            area.innerHTML = "";
            
            if (snap.empty) {
                area.innerHTML = "<p style='text-align:center; color:#64748b;'>لا توجد مباريات مضافة حالياً</p>";
                return;
            }

            snap.forEach(doc => {
                const m = doc.data();
                area.innerHTML += `
                <div class="match-box">
                    <div style="text-align:center; font-size:12px; color:var(--cup); margin-bottom:10px;">
                        ${getRoundName(m.round)}
                    </div>
                    <div class="flex">
                        <div style="text-align:center; flex:1">
                            <img src="${m.t1.logo}" class="admin-logo"><br>
                            <small>${m.t1.name}</small>
                        </div>
                        
                        <div class="flex" style="gap:5px">
                            <input type="number" id="s1_${doc.id}" value="${m.score1}" style="width:45px; text-align:center">
                            <b>-</b>
                            <input type="number" id="s2_${doc.id}" value="${m.score2}" style="width:45px; text-align:center">
                        </div>

                        <div style="text-align:center; flex:1">
                            <img src="${m.t2.logo}" class="admin-logo"><br>
                            <small>${m.t2.name}</small>
                        </div>
                    </div>
                    <div class="flex" style="margin-top:10px; gap:10px">
                        <button onclick="updateCup('${doc.id}')" style="background:#10b981; height:35px; padding:0">تحديث النتيجة</button>
                        <button onclick="deleteMatch('${doc.id}')" style="background:#ef4444; height:35px; padding:0; width:80px">حذف</button>
                    </div>
                </div>`;
            });
        });
    }

    async function updateCup(id) {
        const s1 = parseInt(document.getElementById('s1_'+id).value);
        const s2 = parseInt(document.getElementById('s2_'+id).value);
        
        await db.collection("cup_matches").doc(id).update({
            score1: s1,
            score2: s2
        });
        Swal.fire({ title: 'تم التحديث', icon: 'success', timer: 1000, showConfirmButton: false });
    }

    async function deleteMatch(id) {
        const result = await Swal.fire({
            title: 'هل أنت متأكد؟',
            text: "سيتم حذف المباراة نهائياً من الجدول",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'نعم، احذفها'
        });

        if (result.isConfirmed) {
            await db.collection("cup_matches").doc(id).delete();
            Swal.fire('تم الحذف', '', 'success');
        }
    }

    function getRoundName(round) {
        const names = {
            'round32': 'دور الـ 32',
            'round16': 'دور الـ 16',
            'round8': 'ربع النهائي',
            'round4': 'نصف النهائي',
            'round2': 'النهائي'
        };
        return names[round] || round;
    }

    loadInitialData();
    loadCupAdmin();
</script>
</body>
</html>
