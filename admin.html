<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | إدارة المباريات الشاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #38bdf8; --accent: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --danger: #ef4444;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        header { text-align: center; padding: 25px; background: var(--card); border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 30px; }
        h2 { color: var(--primary); margin: 0 0 20px 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* تصميم الفلتر الجديد */
        .filter-box {
            background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid var(--accent);
            margin-bottom: 20px; display: flex; align-items: center; gap: 15px;
        }

        .round-container { margin-top: 20px; border-right: 4px solid var(--accent); padding-right: 15px; }
        .round-title { background: var(--accent); color: white; padding: 5px 15px; border-radius: 5px; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        .match-item { 
            background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid var(--border); 
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px; transition: 0.3s;
        }
        .match-item:hover { border-color: var(--primary); }
        .team-name { flex: 1; font-weight: bold; font-size: 0.9rem; }
        .team-left { text-align: left; }
        .team-right { text-align: right; }
        .score-box { display: flex; align-items: center; gap: 5px; }
        .score-input { width: 45px; padding: 8px; text-align: center; background: var(--card); border: 1px solid var(--border); color: white; border-radius: 5px; font-weight: bold; }
        .score-input:disabled { background: #334155; color: var(--primary); border: none; }
        .btn-save-match { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .btn-save-match:disabled { background: #10b981; cursor: default; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; margin-right: 5px; }
        select { padding: 10px; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>⚙️ إدارة مباريات الدوري</h1>
    <div style="margin-top: 10px;">
        <select id="leagueSelector" onchange="loadLeagueSchedule()">
            <option value="league1">البطولة الأولى (SC League)</option>
            <option value="league2">البطولة الثانية (KC League)</option>
        </select>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>📍 إضافة فريق للدوري</h2>
        <div style="display: flex; gap: 10px;">
            <select id="mainTeamsSelect" style="flex: 2;"><option>جاري تحميل الفرق المتوفرة...</option></select>
            <button class="btn-save-match" style="flex: 1; height: 45px;" onclick="distributeTeam()">إضافة للبطولة المختارة</button>
        </div>
    </div>

    <div class="card">
        <h2>⚽ مباريات الموسم</h2>
        
        <div class="filter-box">
            <span>🔍 عرض مباريات فريق معين فقط:</span>
            <select id="teamFocusFilter" onchange="filterMatchesByTeam()">
                <option value="all">كل الفرق</option>
            </select>
        </div>

        <div id="scheduleLoading" style="text-align: center; color: var(--primary);">يرجى الانتظار، جاري تنظيم الجولات...</div>
        <div id="roundsGrid"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    // تهيئة Firebase
    firebase.initializeApp({
        apiKey: "AIzaSyCoKTf4Q-cduIwZzRSPHH6SC1xUanSK-M0",
        authDomain: "cluuuub-90ab9.firebaseapp.com",
        projectId: "cluuuub-90ab9"
    });
    const db = firebase.firestore();

    let allRegisteredTeams = [];
    let savedMatches = {};

    function createSchedule(teams) {
        if (teams.length % 2 !== 0) teams.push({ id: 'bye', name: 'استراحة' });
        let rounds = [];
        let t = [...teams];
        let n = t.length;

        for (let r = 0; r < (n - 1) * 2; r++) {
            let roundMatches = [];
            for (let i = 0; i < n / 2; i++) {
                let home = t[i];
                let away = t[n - 1 - i];
                if (home.id !== 'bye' && away.id !== 'bye') {
                    if (r >= n - 1) roundMatches.push({ h: away, a: home });
                    else roundMatches.push({ h: home, a: away });
                }
            }
            rounds.push(roundMatches);
            t.splice(1, 0, t.pop());
        }
        return rounds;
    }

    async function loadAvailableTeams() {
        const l1 = await db.collection("league1").get();
        const l2 = await db.collection("league2").get();
        let usedIds = [];
        l1.forEach(doc => usedIds.push(doc.id));
        l2.forEach(doc => usedIds.push(doc.id));

        db.collection("teams").onSnapshot(snap => {
            const select = document.getElementById("mainTeamsSelect");
            select.innerHTML = "";
            allRegisteredTeams = [];
            snap.forEach(doc => {
                if (!usedIds.includes(doc.id)) {
                    allRegisteredTeams.push({id: doc.id, ...doc.data()});
                    select.innerHTML += `<option value="${doc.id}">${doc.data().playerTeamName}</option>`;
                }
            });
        });
    }

    // وظيفة الفلترة المضافة
    function filterMatchesByTeam() {
        const selectedTeamId = document.getElementById("teamFocusFilter").value;
        const allMatchItems = document.querySelectorAll('.match-item');
        const allRoundContainers = document.querySelectorAll('.round-container');

        allMatchItems.forEach(item => {
            if (selectedTeamId === "all") {
                item.style.display = "flex";
            } else {
                // نتحقق إذا كان الفريق المختار موجود كطرف أول أو ثان في المباراة
                if (item.getAttribute('data-t1') === selectedTeamId || item.getAttribute('data-t2') === selectedTeamId) {
                    item.style.display = "flex";
                } else {
                    item.style.display = "none";
                }
            }
        });

        // إخفاء الجولات التي لا تحتوي على مباريات ظاهرة للفريق المختار
        allRoundContainers.forEach(round => {
            const visibleMatches = round.querySelectorAll('.match-item[style="display: flex;"]');
            round.style.display = visibleMatches.length > 0 ? "block" : "none";
        });
    }

    async function loadLeagueSchedule() {
        const league = document.getElementById("leagueSelector").value;
        const grid = document.getElementById("roundsGrid");
        const focusFilter = document.getElementById("teamFocusFilter");
        
        document.getElementById("scheduleLoading").style.display = "block";
        grid.innerHTML = "";
        focusFilter.innerHTML = '<option value="all">كل الفرق</option>';

        const teamsSnap = await db.collection(league).get();
        let teams = [];
        teamsSnap.forEach(doc => {
            const tData = {id: doc.id, name: doc.data().name};
            teams.push(tData);
            // إضافة الفرق لفلتر الاختيار الصغير
            focusFilter.innerHTML += `<option value="${tData.id}">${tData.name}</option>`;
        });

        if (teams.length < 2) {
            grid.innerHTML = "<p style='text-align:center;'>يجب إضافة فريقين على الأقل لإنشاء الجدول.</p>";
            document.getElementById("scheduleLoading").style.display = "none";
            return;
        }

        const matchesSnap = await db.collection("matches_history").where("league", "==", league).get();
        savedMatches = {};
        matchesSnap.forEach(doc => {
            const data = doc.data();
            savedMatches[`${data.t1Id}_${data.t2Id}`] = data;
        });

        const rounds = createSchedule(teams);
        document.getElementById("scheduleLoading").style.display = "none";

        rounds.forEach((matches, index) => {
            let roundDiv = document.createElement("div");
            roundDiv.className = "round-container";
            roundDiv.innerHTML = `<div class="round-title">الجولة ${index + 1}</div>`;

            matches.forEach(m => {
                const matchKey = `${m.h.id}_${m.a.id}`;
                const data = savedMatches[matchKey];
                const isPlayed = !!data;

                // أضفنا attributes داتا لحفظ معرفات الفرق لسهولة الفلترة
                const matchHtml = `
                    <div class="match-item" data-t1="${m.h.id}" data-t2="${m.a.id}">
                        <span class="team-name team-left">${m.h.name}</span>
                        <div class="score-box">
                            <input type="number" id="g1_${matchKey}" class="score-input" value="${isPlayed ? data.g1 : ''}" ${isPlayed ? 'disabled' : ''}>
                            <span>-</span>
                            <input type="number" id="g2_${matchKey}" class="score-input" value="${isPlayed ? data.g2 : ''}" ${isPlayed ? 'disabled' : ''}>
                        </div>
                        <span class="team-name team-right">${m.a.name}</span>
                        <div style="display: flex; gap: 5px;">
                            <button id="btn_${matchKey}" class="btn-save-match" 
                                onclick="saveLeagueMatch('${league}', '${m.h.id}', '${m.a.id}', '${m.h.name}', '${m.a.name}')" 
                                ${isPlayed ? 'disabled' : ''}>
                                ${isPlayed ? 'تم الحفظ ✓' : 'حفظ'}
                            </button>
                            ${isPlayed ? `<button class="btn-delete" onclick="deleteMatchResult('${league}', '${m.h.id}', '${m.a.id}', ${data.g1}, ${data.g2})">حذف</button>` : ''}
                        </div>
                    </div>
                `;
                roundDiv.innerHTML += matchHtml;
            });
            grid.appendChild(roundDiv);
        });
    }

    async function saveLeagueMatch(league, t1Id, t2Id, t1Name, t2Name) {
        const key = `${t1Id}_${t2Id}`;
        const g1 = parseInt(document.getElementById(`g1_${key}`).value);
        const g2 = parseInt(document.getElementById(`g2_${key}`).value);

        if (isNaN(g1) || isNaN(g2)) return Swal.fire('خطأ', 'يرجى إدخال النتيجة', 'error');

        try {
            const batch = db.batch();
            let p1 = 0, p2 = 0;
            if (g1 > g2) p1 = 3; else if (g1 < g2) p2 = 3; else { p1 = 1; p2 = 1; }

            const t1Ref = db.collection(league).doc(t1Id);
            batch.update(t1Ref, {
                points: firebase.firestore.FieldValue.increment(p1),
                played: firebase.firestore.FieldValue.increment(1),
                goalsFor: firebase.firestore.FieldValue.increment(g1),
                goalsAgainst: firebase.firestore.FieldValue.increment(g2)
            });

            const t2Ref = db.collection(league).doc(t2Id);
            batch.update(t2Ref, {
                points: firebase.firestore.FieldValue.increment(p2),
                played: firebase.firestore.FieldValue.increment(1),
                goalsFor: firebase.firestore.FieldValue.increment(g2),
                goalsAgainst: firebase.firestore.FieldValue.increment(g1)
            });

            const historyRef = db.collection("matches_history").doc(`${league}_${key}`);
            batch.set(historyRef, {
                league, t1Id, t2Id, g1, g2, t1Name, t2Name, date: new Date()
            });

            await batch.commit();
            Swal.fire('تم!', 'تم تسجيل النتيجة وتحديث الترتيب', 'success');
            loadLeagueSchedule(); 
        } catch (e) {
            Swal.fire('فشل', 'حدث خطأ أثناء الحفظ', 'error');
        }
    }

    async function deleteMatchResult(league, t1Id, t2Id, g1, g2) {
        const confirm = await Swal.fire({
            title: 'هل تريد حذف النتيجة؟',
            text: "سيتم خصم النقاط والأهداف التي سُجلت من رصيد الفرق وتعديل الترتيب.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'نعم، احذف النتيجة',
            cancelButtonText: 'إلغاء'
        });

        if (confirm.isConfirmed) {
            try {
                const batch = db.batch();
                let p1 = 0, p2 = 0;
                if (g1 > g2) p1 = 3; else if (g1 < g2) p2 = 3; else { p1 = 1; p2 = 1; }

                const t1Ref = db.collection(league).doc(t1Id);
                batch.update(t1Ref, {
                    points: firebase.firestore.FieldValue.increment(-p1),
                    played: firebase.firestore.FieldValue.increment(-1),
                    goalsFor: firebase.firestore.FieldValue.increment(-g1),
                    goalsAgainst: firebase.firestore.FieldValue.increment(-g2)
                });

                const t2Ref = db.collection(league).doc(t2Id);
                batch.update(t2Ref, {
                    points: firebase.firestore.FieldValue.increment(-p2),
                    played: firebase.firestore.FieldValue.increment(-1),
                    goalsFor: firebase.firestore.FieldValue.increment(-g2),
                    goalsAgainst: firebase.firestore.FieldValue.increment(-g1)
                });

                const historyRef = db.collection("matches_history").doc(`${league}_${t1Id}_${t2Id}`);
                batch.delete(historyRef);

                await batch.commit();
                Swal.fire('تم!', 'تم حذف النتيجة وتحديث الترتيب بنجاح', 'success');
                loadLeagueSchedule();
            } catch (e) {
                Swal.fire('خطأ', 'فشل في حذف النتيجة', 'error');
            }
        }
    }

    async function distributeTeam() {
        const teamId = document.getElementById("mainTeamsSelect").value;
        const league = document.getElementById("leagueSelector").value;
        if (!teamId) return;
        const team = allRegisteredTeams.find(t => t.id === teamId);
        await db.collection(league).doc(teamId).set({
            name: team.playerTeamName, logo: team.clubLogo,
            points: 0, played: 0, goalsFor: 0, goalsAgainst: 0
        });
        Swal.fire('تم!', 'تمت إضافة الفريق بنجاح', 'success');
        loadAvailableTeams();
        loadLeagueSchedule();
    }

    loadAvailableTeams();
    loadLeagueSchedule();
</script>
</body>
</html>
